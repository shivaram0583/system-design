<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="820" viewBox="0 0 1480 820" role="img" aria-labelledby="title desc">
  <title id="title">End-to-End Request Lifecycle</title>
  <desc id="desc">High-fidelity system design visual for the client-server architecture section.</desc>
  <defs>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f6fed" />
      <stop offset="100%" stop-color="#1944b9" />
    </linearGradient>
    <linearGradient id="accentTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17b8a6" />
      <stop offset="100%" stop-color="#0e8e7e" />
    </linearGradient>
    <linearGradient id="accentGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcd57" />
      <stop offset="100%" stop-color="#f59f0a" />
    </linearGradient>
    <linearGradient id="accentRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b8f" />
      <stop offset="100%" stop-color="#df5170" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#adc3e6" flood-opacity="0.38" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#274690"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5a78c8"/>
    </marker>
    <style>
      .bg { fill: url(#page); }
      .panel { fill: #ffffff; stroke: #d7e3fb; stroke-width: 1.4; filter: url(#shadow); }
      .soft { fill: #f8fbff; stroke: #d7e3fb; stroke-width: 1.2; }
      .title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #0f254e; }
      .subtitle { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #496288; }
      .cardTitle { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #102a56; }
      .cardBody { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #35527f; }
      .small { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #496288; text-transform: uppercase; letter-spacing: 1px; }
      .tiny { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #6a7fa2; letter-spacing: 0.4px; }
      .labelDark { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #143160; }
      .node { fill: #ffffff; stroke: #bed2f4; stroke-width: 1.4; }
      .nodeBlue { fill: #edf4ff; stroke: #95b8ff; stroke-width: 1.4; }
      .nodeTeal { fill: #ebfffb; stroke: #76d8cc; stroke-width: 1.4; }
      .nodeGold { fill: #fff8e7; stroke: #f4c55d; stroke-width: 1.4; }
      .nodeRose { fill: #fff1f4; stroke: #f0a1b4; stroke-width: 1.4; }
      .accentBlue { fill: url(#accentBlue); }
      .accentTeal { fill: url(#accentTeal); }
      .accentGold { fill: url(#accentGold); }
      .accentRose { fill: url(#accentRose); }
      .white { fill: #ffffff; font: 700 18px "Segoe UI", Arial, sans-serif; }
      .line { stroke: #274690; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .lineSoft { stroke: #5a78c8; stroke-width: 3; fill: none; marker-end: url(#arrowSoft); }
      .guide { stroke: #bfd0f1; stroke-width: 2; fill: none; }
      .guideSoft { stroke: #dce7fb; stroke-width: 1.6; fill: none; stroke-dasharray: 10 8; }
      .dashed { stroke-dasharray: 12 10; }
      .stepLabel { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #35527f; }
    </style>
  </defs>
  <rect class="bg" width="1480" height="820" rx="28" />
  <text x="48" y="58" class="title">End-to-End Request Lifecycle</text>
  <text x="48" y="86" class="subtitle">GitHub-safe SVG infographic for cleaner documentation rendering</text>
  
  
  <rect x="70" y="170" width="1340" height="560" rx="24" class="panel" />
  <text x="90" y="204" class="small">Journey</text>
  
  
  <rect x="118" y="276" width="140" height="52" rx="26" class="accentBlue" />
  <text x="188" y="308" text-anchor="middle" class="white">1. DNS</text>
  
  <rect x="308" y="276" width="170" height="52" rx="26" class="accentGold" />
  <text x="393" y="308" text-anchor="middle" class="white">2. TCP</text>
  
  <rect x="536" y="276" width="170" height="52" rx="26" class="accentTeal" />
  <text x="621" y="308" text-anchor="middle" class="white">3. TLS</text>
  
  <rect x="762" y="276" width="200" height="52" rx="26" class="accentRose" />
  <text x="862" y="308" text-anchor="middle" class="white">4. HTTP Request</text>
  
  <rect x="1016" y="276" width="220" height="52" rx="26" class="accentBlue" />
  <text x="1126" y="308" text-anchor="middle" class="white">5. Server Work</text>
  
  <rect x="1260" y="276" width="140" height="52" rx="26" class="accentTeal" />
  <text x="1330" y="308" text-anchor="middle" class="white">6. Response</text>
  
  <path d="M 258 302 L 308 302" class="line" />
  
  
  <path d="M 478 302 L 536 302" class="line" />
  
  
  <path d="M 706 302 L 762 302" class="line" />
  
  
  <path d="M 962 302 L 1016 302" class="line" />
  
  
  <path d="M 1236 302 L 1260 302" class="line" />
  
  
  <rect x="104" y="390" width="164" height="120" rx="24" class="nodeBlue" />
  <text x="124" y="424" class="small">Resolve</text>
  <text x="124" y="454" class="cardBody">example.com</text>
<text x="124" y="478" class="cardBody">to an IP address</text>
  
  <rect x="310" y="390" width="164" height="120" rx="24" class="nodeGold" />
  <text x="330" y="424" class="small">Connect</text>
  <text x="330" y="454" class="cardBody">SYN</text>
<text x="330" y="478" class="cardBody">SYN-ACK</text>
<text x="330" y="502" class="cardBody">ACK</text>
  
  <rect x="538" y="390" width="164" height="120" rx="24" class="nodeTeal" />
  <text x="558" y="424" class="small">Secure</text>
  <text x="558" y="454" class="cardBody">ClientHello</text>
<text x="558" y="478" class="cardBody">ServerHello</text>
<text x="558" y="502" class="cardBody">certificate</text>
  
  <rect x="782" y="390" width="160" height="120" rx="24" class="nodeRose" />
  <text x="802" y="424" class="small">Ask</text>
  <text x="802" y="454" class="cardBody">GET /api/users/42</text>
<text x="802" y="478" class="cardBody">headers + auth</text>
  
  <rect x="1022" y="390" width="210" height="120" rx="24" class="nodeBlue" />
  <text x="1042" y="424" class="small">Process</text>
  <text x="1042" y="454" class="cardBody">Authenticate</text>
<text x="1042" y="478" class="cardBody">run business logic</text>
<text x="1042" y="502" class="cardBody">check cache / query DB</text>
  
  <rect x="1268" y="390" width="118" height="120" rx="24" class="nodeTeal" />
  <text x="1288" y="424" class="small">Return</text>
  <text x="1288" y="454" class="cardBody">200 OK</text>
<text x="1288" y="478" class="cardBody">JSON body</text>
  
  <rect x="110" y="566" width="1274" height="100" rx="24" class="soft" />
  <text x="130" y="600" class="small">Key Insight</text>
  <text x="130" y="630" class="cardBody">Most perceived latency comes from network setup, server work, and payload transfer — so caching, keep-alive, and efficient payloads matter.</text>
  
</svg>
