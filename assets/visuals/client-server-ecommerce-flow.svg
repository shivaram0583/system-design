<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">E-Commerce Product Page: Architecture and Request Flow</title>
  <desc id="desc">High-fidelity system design visual for the client-server architecture section.</desc>
  <defs>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f6fed" />
      <stop offset="100%" stop-color="#1944b9" />
    </linearGradient>
    <linearGradient id="accentTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17b8a6" />
      <stop offset="100%" stop-color="#0e8e7e" />
    </linearGradient>
    <linearGradient id="accentGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcd57" />
      <stop offset="100%" stop-color="#f59f0a" />
    </linearGradient>
    <linearGradient id="accentRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b8f" />
      <stop offset="100%" stop-color="#df5170" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#adc3e6" flood-opacity="0.38" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#274690"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5a78c8"/>
    </marker>
    <style>
      .bg { fill: url(#page); }
      .panel { fill: #ffffff; stroke: #d7e3fb; stroke-width: 1.4; filter: url(#shadow); }
      .soft { fill: #f8fbff; stroke: #d7e3fb; stroke-width: 1.2; }
      .title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #0f254e; }
      .subtitle { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #496288; }
      .cardTitle { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #102a56; }
      .cardBody { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #35527f; }
      .small { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #496288; text-transform: uppercase; letter-spacing: 1px; }
      .tiny { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #6a7fa2; letter-spacing: 0.4px; }
      .labelDark { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #143160; }
      .node { fill: #ffffff; stroke: #bed2f4; stroke-width: 1.4; }
      .nodeBlue { fill: #edf4ff; stroke: #95b8ff; stroke-width: 1.4; }
      .nodeTeal { fill: #ebfffb; stroke: #76d8cc; stroke-width: 1.4; }
      .nodeGold { fill: #fff8e7; stroke: #f4c55d; stroke-width: 1.4; }
      .nodeRose { fill: #fff1f4; stroke: #f0a1b4; stroke-width: 1.4; }
      .accentBlue { fill: url(#accentBlue); }
      .accentTeal { fill: url(#accentTeal); }
      .accentGold { fill: url(#accentGold); }
      .accentRose { fill: url(#accentRose); }
      .white { fill: #ffffff; font: 700 18px "Segoe UI", Arial, sans-serif; }
      .line { stroke: #274690; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .lineSoft { stroke: #5a78c8; stroke-width: 3; fill: none; marker-end: url(#arrowSoft); }
      .guide { stroke: #bfd0f1; stroke-width: 2; fill: none; }
      .guideSoft { stroke: #dce7fb; stroke-width: 1.6; fill: none; stroke-dasharray: 10 8; }
      .dashed { stroke-dasharray: 12 10; }
      .stepLabel { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #35527f; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="980" rx="28" />
  <text x="48" y="58" class="title">E-Commerce Product Page: Architecture and Request Flow</text>
  <text x="48" y="86" class="subtitle">GitHub-safe SVG infographic for cleaner documentation rendering</text>
  
  
  <rect x="74" y="150" width="1352" height="338" rx="24" class="panel" />
  <text x="94" y="184" class="small">Top-Level Architecture</text>
  
  
  <rect x="118" y="242" width="176" height="104" rx="24" class="nodeBlue" />
  <text x="138" y="276" class="small">Browser</text>
  <text x="138" y="306" class="cardBody">React storefront</text>
  
  <rect x="350" y="242" width="176" height="104" rx="24" class="nodeTeal" />
  <text x="370" y="276" class="small">CDN</text>
  <text x="370" y="306" class="cardBody">Static JS/CSS/img</text>
  
  <rect x="582" y="242" width="176" height="104" rx="24" class="nodeGold" />
  <text x="602" y="276" class="small">Load Balancer</text>
  <text x="602" y="306" class="cardBody">Routes dynamic traffic</text>
  
  <rect x="814" y="210" width="196" height="168" rx="24" class="nodeRose" />
  <text x="834" y="244" class="small">App Servers</text>
  <text x="834" y="274" class="cardBody">Server 1</text>
<text x="834" y="298" class="cardBody">Server 2</text>
<text x="834" y="322" class="cardBody">Server 3</text>
  
  <rect x="1084" y="226" width="150" height="124" rx="24" class="nodeTeal" />
  <text x="1104" y="260" class="small">Redis</text>
  <text x="1104" y="290" class="cardBody">Product cache</text>
  
  <rect x="1262" y="226" width="120" height="124" rx="24" class="nodeBlue" />
  <text x="1282" y="260" class="small">Postgres</text>
  <text x="1282" y="290" class="cardBody">Products</text>
<text x="1282" y="314" class="cardBody">Reviews</text>
  
  <path d="M 294 294 L 350 294" class="line" />
  
  
  <path d="M 526 294 L 582 294" class="line" />
  
  
  <path d="M 758 294 L 814 294" class="line" />
  
  
  <path d="M 1010 294 L 1084 294" class="line" />
  <text x="1047" y="284" text-anchor="middle" class="stepLabel">Cache</text>
  
  <path d="M 1234 294 L 1262 294" class="line" />
  <text x="1248" y="284" text-anchor="middle" class="stepLabel">Miss</text>

  
  <rect x="74" y="540" width="1352" height="348" rx="24" class="panel" />
  <text x="94" y="574" class="small">Read Path</text>
  
  
  <rect x="120" y="640" width="144" height="88" rx="24" class="nodeBlue" />
  <text x="140" y="674" class="small">1. Client</text>
  <text x="140" y="704" class="cardBody">GET /product/12345</text>
  
  <rect x="304" y="640" width="144" height="88" rx="24" class="nodeTeal" />
  <text x="324" y="674" class="small">2. CDN</text>
  <text x="324" y="704" class="cardBody">Cache hit?</text>
<text x="324" y="728" class="cardBody">Serve static assets</text>
  
  <rect x="488" y="640" width="144" height="88" rx="24" class="nodeGold" />
  <text x="508" y="674" class="small">3. LB</text>
  <text x="508" y="704" class="cardBody">Forward dynamic call</text>
  
  <rect x="672" y="640" width="144" height="88" rx="24" class="nodeRose" />
  <text x="692" y="674" class="small">4. Server</text>
  <text x="692" y="704" class="cardBody">Auth + assemble response</text>
  
  <rect x="856" y="640" width="144" height="88" rx="24" class="nodeTeal" />
  <text x="876" y="674" class="small">5. Redis</text>
  <text x="876" y="704" class="cardBody">Product cache</text>
  
  <rect x="1040" y="640" width="144" height="88" rx="24" class="nodeBlue" />
  <text x="1060" y="674" class="small">6. Postgres</text>
  <text x="1060" y="704" class="cardBody">Fallback source of truth</text>
  
  <rect x="1224" y="640" width="144" height="88" rx="24" class="nodeGold" />
  <text x="1244" y="674" class="small">7. Response</text>
  <text x="1244" y="704" class="cardBody">Return page data</text>
  
  <path d="M 264 684 L 304 684" class="line" />
  
  
  <path d="M 448 684 L 488 684" class="line" />
  
  
  <path d="M 632 684 L 672 684" class="line" />
  
  
  <path d="M 816 684 L 856 684" class="line" />
  
  
  <path d="M 1000 684 L 1040 684" class="line" />
  <text x="1020" y="674" text-anchor="middle" class="stepLabel">Miss</text>
  
  <path d="M 1184 684 L 1224 684" class="line" />
  
  
  <rect x="146" y="784" width="1208" height="74" rx="24" class="soft" />
  <text x="166" y="818" class="small">Performance Goal</text>
  <text x="166" y="848" class="cardBody">Static assets come from the CDN, product data comes from cache when possible, and the database is the fallback — keeping the page under the 2-second target.</text>
  
</svg>
