<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="920" viewBox="0 0 1480 920" role="img" aria-labelledby="title desc">
  <title id="title">Generic Web Application HLD</title>
  <desc id="desc">High-fidelity system design visual for the client-server architecture section.</desc>
  <defs>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f6fed" />
      <stop offset="100%" stop-color="#1944b9" />
    </linearGradient>
    <linearGradient id="accentTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17b8a6" />
      <stop offset="100%" stop-color="#0e8e7e" />
    </linearGradient>
    <linearGradient id="accentGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcd57" />
      <stop offset="100%" stop-color="#f59f0a" />
    </linearGradient>
    <linearGradient id="accentRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b8f" />
      <stop offset="100%" stop-color="#df5170" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#adc3e6" flood-opacity="0.38" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#274690"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5a78c8"/>
    </marker>
    <style>
      .bg { fill: url(#page); }
      .panel { fill: #ffffff; stroke: #d7e3fb; stroke-width: 1.4; filter: url(#shadow); }
      .soft { fill: #f8fbff; stroke: #d7e3fb; stroke-width: 1.2; }
      .title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #0f254e; }
      .subtitle { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #496288; }
      .cardTitle { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #102a56; }
      .cardBody { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #35527f; }
      .small { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #496288; text-transform: uppercase; letter-spacing: 1px; }
      .tiny { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #6a7fa2; letter-spacing: 0.4px; }
      .labelDark { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #143160; }
      .node { fill: #ffffff; stroke: #bed2f4; stroke-width: 1.4; }
      .nodeBlue { fill: #edf4ff; stroke: #95b8ff; stroke-width: 1.4; }
      .nodeTeal { fill: #ebfffb; stroke: #76d8cc; stroke-width: 1.4; }
      .nodeGold { fill: #fff8e7; stroke: #f4c55d; stroke-width: 1.4; }
      .nodeRose { fill: #fff1f4; stroke: #f0a1b4; stroke-width: 1.4; }
      .accentBlue { fill: url(#accentBlue); }
      .accentTeal { fill: url(#accentTeal); }
      .accentGold { fill: url(#accentGold); }
      .accentRose { fill: url(#accentRose); }
      .white { fill: #ffffff; font: 700 18px "Segoe UI", Arial, sans-serif; }
      .line { stroke: #274690; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .lineSoft { stroke: #5a78c8; stroke-width: 3; fill: none; marker-end: url(#arrowSoft); }
      .guide { stroke: #bfd0f1; stroke-width: 2; fill: none; }
      .guideSoft { stroke: #dce7fb; stroke-width: 1.6; fill: none; stroke-dasharray: 10 8; }
      .dashed { stroke-dasharray: 12 10; }
      .stepLabel { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #35527f; }
    </style>
  </defs>
  <rect class="bg" width="1480" height="920" rx="28" />
  <text x="48" y="58" class="title">Generic Web Application HLD</text>
  <text x="48" y="86" class="subtitle">GitHub-safe SVG infographic for cleaner documentation rendering</text>
  
  
  <rect x="70" y="154" width="1340" height="690" rx="24" class="panel" />
  <text x="90" y="188" class="small">Reference HLD</text>
  
  
  <rect x="104" y="246" width="250" height="120" rx="24" class="nodeBlue" />
  <text x="124" y="280" class="small">Clients</text>
  <text x="124" y="310" class="cardBody">Web</text>
<text x="124" y="334" class="cardBody">iOS</text>
<text x="124" y="358" class="cardBody">Android</text>
<text x="124" y="382" class="cardBody">3rd-party API</text>
  
  <rect x="410" y="246" width="172" height="120" rx="24" class="nodeTeal" />
  <text x="430" y="280" class="small">CDN</text>
  <text x="430" y="310" class="cardBody">Static assets</text>
  
  <rect x="628" y="246" width="172" height="120" rx="24" class="nodeGold" />
  <text x="648" y="280" class="small">DNS + WAF</text>
  <text x="648" y="310" class="cardBody">Resolve + protect</text>
  
  <rect x="846" y="246" width="172" height="120" rx="24" class="nodeRose" />
  <text x="866" y="280" class="small">Load Balancer</text>
  <text x="866" y="310" class="cardBody">HTTPS entry point</text>
  
  <rect x="1064" y="210" width="286" height="192" rx="24" class="soft" />
  <text x="1084" y="244" class="small">App Tier</text>
  <text x="1084" y="274" class="cardBody">Server 1</text>
<text x="1084" y="298" class="cardBody">Server 2</text>
<text x="1084" y="322" class="cardBody">Server 3</text>
<text x="1084" y="346" class="cardBody">Stateless business logic</text>
  
  <rect x="932" y="492" width="180" height="120" rx="24" class="nodeTeal" />
  <text x="952" y="526" class="small">Redis</text>
  <text x="952" y="556" class="cardBody">Shared cache</text>
  
  <rect x="1140" y="492" width="180" height="120" rx="24" class="nodeBlue" />
  <text x="1160" y="526" class="small">Postgres</text>
  <text x="1160" y="556" class="cardBody">Primary data store</text>
  
  <rect x="1036" y="656" width="180" height="120" rx="24" class="nodeGold" />
  <text x="1056" y="690" class="small">Kafka</text>
  <text x="1056" y="720" class="cardBody">Async events</text>
  
  <path d="M 354 306 L 410 306" class="line" />
  
  
  <path d="M 582 306 L 628 306" class="line" />
  
  
  <path d="M 800 306 L 846 306" class="line" />
  
  
  <path d="M 1018 306 L 1064 306" class="line" />
  
  
  <path d="M 1208 402 L 1022 492" class="line" />
  <text x="1115" y="437" text-anchor="middle" class="stepLabel">Cache</text>
  
  <path d="M 1232 402 L 1230 492" class="line" />
  <text x="1231" y="437" text-anchor="middle" class="stepLabel">Data</text>
  
  <path d="M 1208 402 L 1126 656" class="lineSoft" />
  <text x="1167" y="519" text-anchor="middle" class="stepLabel">Events</text>
  
  <rect x="104" y="670" width="820" height="120" rx="24" class="soft" />
  <text x="124" y="704" class="small">Operational Lens</text>
  <text x="124" y="734" class="cardBody">Clients fetch static assets from the CDN and dynamic traffic through the balancer.</text>
<text x="124" y="758" class="cardBody">App servers remain stateless so new instances can be added quickly under load.</text>
  
</svg>
