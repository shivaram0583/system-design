  <g>
    <text x="24" y="39" xml:space="preserve">POINT-TO-POINT (Queue):</text>
    <text x="24" y="59" xml:space="preserve">  Producer → Queue → ONE Consumer gets each message</text>
    <text x="24" y="99" xml:space="preserve">PUB-SUB (Topic):</text>
    <text x="24" y="119" xml:space="preserve">  Publisher → Topic → ALL Subscribers get every message</text>
    <text x="24" y="179" xml:space="preserve">    Publisher     event  ►    Topic        event  ► Subscriber A</text>
    <text x="24" y="199" xml:space="preserve">                           &quot;orders&quot;       event  ► Subscriber B</text>
    <text x="24" y="219" xml:space="preserve">                                          event  ► Subscriber C</text>
    <text x="24" y="259" xml:space="preserve">  Publisher doesn&apos;t know who subscribes.</text>
    <text x="24" y="279" xml:space="preserve">  New subscribers can be added without changing the publisher.</text>
  </g>
