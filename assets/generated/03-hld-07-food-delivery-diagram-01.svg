<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="729" height="248" viewBox="0 0 729 248" role="img" aria-labelledby="title desc">
  <title id="title">Order State Machine diagram</title>
  <desc id="desc">Generated vector rendering of a documentation diagram.</desc>
  <defs>
    <style>
      .card { fill: #fbfcff; stroke: #cbd5e1; stroke-width: 1.2; }
      .segments { stroke: #0f172a; stroke-width: 1.8; stroke-linecap: round; }
      text {
        fill: #0f172a;
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 14px;
      }
    </style>
  </defs>
  <rect class="card" x="0.6" y="0.6" width="727.8" height="246.8" rx="16" />
  <g class="segments">
    <line x1="45" y1="44" x2="45" y2="64" />
    <line x1="129" y1="44" x2="129" y2="64" />
    <line x1="616.2" y1="44" x2="616.2" y2="64" />
    <line x1="45" y1="64" x2="49.199999999999996" y2="74" />
    <line x1="607.8000000000001" y1="64" x2="612" y2="74" />
    <line x1="145.8" y1="84" x2="150.00000000000003" y2="94" />
  </g>
  <g>
    <text x="24" y="39" xml:space="preserve">PLACED → CONFIRMED → PREPARING → READY → PICKED_UP → ON_THE_WAY → DELIVERED</text>
    <text x="24" y="79" xml:space="preserve">   → CANCELLED (by customer, before PREPARING)                        → COMPLETED</text>
    <text x="24" y="99" xml:space="preserve">               → REJECTED (by restaurant, if can&apos;t fulfill)</text>
    <text x="24" y="139" xml:space="preserve">Each transition:</text>
    <text x="24" y="159" xml:space="preserve">  1. Validate transition is allowed (state machine rules)</text>
    <text x="24" y="179" xml:space="preserve">  2. Update DB (PostgreSQL, with optimistic locking)</text>
    <text x="24" y="199" xml:space="preserve">  3. Emit event to Kafka (order.status_changed)</text>
    <text x="24" y="219" xml:space="preserve">  4. Notify relevant parties (customer, restaurant, driver)</text>
  </g>
</svg>
