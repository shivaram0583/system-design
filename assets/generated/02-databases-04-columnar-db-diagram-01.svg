  <g>
    <text x="24" y="39" xml:space="preserve">Central FACT table surrounded by DIMENSION tables:</text>
    <text x="24" y="99" xml:space="preserve">                      dim_date  </text>
    <text x="24" y="119" xml:space="preserve">                      date_id   </text>
    <text x="24" y="139" xml:space="preserve">                      year      </text>
    <text x="24" y="159" xml:space="preserve">                      quarter   </text>
    <text x="24" y="179" xml:space="preserve">                      month     </text>
    <text x="24" y="259" xml:space="preserve">   dim_product       fact_sales        dim_store  </text>
    <text x="24" y="279" xml:space="preserve">   product_id     ►  date_id     ◄    store_id   </text>
    <text x="24" y="299" xml:space="preserve">   name              product_id       city       </text>
    <text x="24" y="319" xml:space="preserve">   category          store_id         region     </text>
    <text x="24" y="339" xml:space="preserve">   brand             customer_id                 </text>
    <text x="24" y="359" xml:space="preserve">                    quantity    </text>
    <text x="24" y="379" xml:space="preserve">                     revenue                     </text>
    <text x="24" y="399" xml:space="preserve">                     cost             dim_cust   </text>
    <text x="24" y="419" xml:space="preserve">                                    ► cust_id    </text>
    <text x="24" y="439" xml:space="preserve">                                      segment    </text>
    <text x="24" y="499" xml:space="preserve">  Query: Revenue by product category and region for Q4 2024</text>
    <text x="24" y="519" xml:space="preserve">    SELECT p.category, s.region, SUM(f.revenue)</text>
    <text x="24" y="539" xml:space="preserve">    FROM fact_sales f</text>
    <text x="24" y="559" xml:space="preserve">    JOIN dim_product p ON f.product_id = p.product_id</text>
    <text x="24" y="579" xml:space="preserve">    JOIN dim_store s ON f.store_id = s.store_id</text>
    <text x="24" y="599" xml:space="preserve">    JOIN dim_date d ON f.date_id = d.date_id</text>
    <text x="24" y="619" xml:space="preserve">    WHERE d.quarter = &apos;Q4&apos; AND d.year = 2024</text>
    <text x="24" y="639" xml:space="preserve">    GROUP BY p.category, s.region</text>
    <text x="24" y="679" xml:space="preserve">  Fact table: millions/billions of rows (events, transactions)</text>
    <text x="24" y="699" xml:space="preserve">  Dimension tables: thousands of rows (products, stores, dates)</text>
  </g>
</svg>
