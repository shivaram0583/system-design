  <g>
    <text x="24" y="59" xml:space="preserve">                     DNS (GSLB)                        </text>
    <text x="24" y="79" xml:space="preserve">   User in US → resolve to 1.2.3.4 (US datacenter)   </text>
    <text x="24" y="99" xml:space="preserve">   User in EU → resolve to 5.6.7.8 (EU datacenter)   </text>
    <text x="24" y="179" xml:space="preserve">             US Region        EU Region  </text>
    <text x="24" y="199" xml:space="preserve">             LB → Servers      LB → Servers </text>
    <text x="24" y="259" xml:space="preserve">Strategies:</text>
    <text x="24" y="279" xml:space="preserve">  • Geographic: Route to nearest datacenter</text>
    <text x="24" y="299" xml:space="preserve">  • Latency-based: Route to lowest-latency datacenter</text>
    <text x="24" y="319" xml:space="preserve">  • Failover: Route to backup if primary is down</text>
    <text x="24" y="339" xml:space="preserve">  • Weighted: Split traffic (80% US, 20% EU)</text>
  </g>
</svg>
