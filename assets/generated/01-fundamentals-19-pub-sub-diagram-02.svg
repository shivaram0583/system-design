  <g>
    <text x="24" y="39" xml:space="preserve">A single event needs to trigger multiple independent actions:</text>
    <text x="24" y="79" xml:space="preserve">  Order Created Event</text>
    <text x="24" y="119" xml:space="preserve">          ► Payment Service (charge card)</text>
    <text x="24" y="139" xml:space="preserve">          ► Inventory Service (reserve stock)</text>
    <text x="24" y="159" xml:space="preserve">          ► Email Service (send confirmation)</text>
    <text x="24" y="179" xml:space="preserve">          ► Analytics Service (track conversion)</text>
    <text x="24" y="199" xml:space="preserve">          ► Fraud Service (check for fraud)</text>
    <text x="24" y="239" xml:space="preserve">Without pub-sub: Order Service calls each one (tight coupling, slow)</text>
    <text x="24" y="259" xml:space="preserve">With pub-sub: Order Service publishes once, 5 subscribers react independently</text>
