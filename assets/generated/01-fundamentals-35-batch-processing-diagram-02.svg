  <g>
    <text x="24" y="39" xml:space="preserve">LAMBDA (batch + stream):</text>
    <text x="24" y="79" xml:space="preserve">    Raw Data              </text>
    <text x="24" y="119" xml:space="preserve">       ▼         ▼        </text>
    <text x="24" y="139" xml:space="preserve">    [Batch]  [Stream]    </text>
    <text x="24" y="159" xml:space="preserve">    (Spark)  (Flink)     </text>
    <text x="24" y="199" xml:space="preserve">       ▼         ▼        </text>
    <text x="24" y="219" xml:space="preserve">    [Serving Layer]         Merge batch + stream results</text>
    <text x="24" y="259" xml:space="preserve">  Pros: Accurate (batch) + real-time (stream)</text>
    <text x="24" y="279" xml:space="preserve">  Cons: Two codebases to maintain</text>
    <text x="24" y="319" xml:space="preserve">KAPPA (stream only):</text>
    <text x="24" y="359" xml:space="preserve">    Raw Data              </text>
    <text x="24" y="399" xml:space="preserve">       ▼                  </text>
    <text x="24" y="419" xml:space="preserve">    [Stream only]         </text>
    <text x="24" y="439" xml:space="preserve">    (Flink/Kafka)         </text>
    <text x="24" y="479" xml:space="preserve">       ▼                  </text>
    <text x="24" y="499" xml:space="preserve">    [Serving Layer]         Replay Kafka for historical reprocessing</text>
    <text x="24" y="539" xml:space="preserve">  Pros: Single codebase, simpler</text>
    <text x="24" y="559" xml:space="preserve">  Cons: Replay can be slow for large datasets</text>
  </g>
