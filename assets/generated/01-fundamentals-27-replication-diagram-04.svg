  <g>
    <text x="24" y="59" xml:space="preserve">   Node 1     Node 2     Node 3  </text>
    <text x="24" y="119" xml:space="preserve">  Write to W nodes, Read from R nodes</text>
    <text x="24" y="139" xml:space="preserve">  If W + R &gt; N → guaranteed to read latest write (quorum)</text>
    <text x="24" y="179" xml:space="preserve">  Example: N=3, W=2, R=2</text>
    <text x="24" y="199" xml:space="preserve">    Write to 2 nodes → Read from 2 nodes → at least 1 has latest</text>
    <text x="24" y="239" xml:space="preserve">Pros: No single point of failure, high availability</text>
    <text x="24" y="259" xml:space="preserve">Cons: Complex conflict resolution, weaker consistency</text>
    <text x="24" y="279" xml:space="preserve">Used by: Cassandra, DynamoDB, Riak</text>
  </g>
