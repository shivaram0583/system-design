  <g>
    <text x="24" y="39" xml:space="preserve">ROUND ROBIN:</text>
    <text x="24" y="59" xml:space="preserve">  Request 1 → Server A</text>
    <text x="24" y="79" xml:space="preserve">  Request 2 → Server B</text>
