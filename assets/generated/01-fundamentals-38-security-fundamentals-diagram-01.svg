  <g>
    <text x="24" y="39" xml:space="preserve">CIA Triad — the foundation of information security:</text>
    <text x="24" y="99" xml:space="preserve">     CONFIDENTIALITY    Only authorized users can access data</text>
    <text x="24" y="139" xml:space="preserve">     INTEGRITY          Data is not tampered with or corrupted</text>
    <text x="24" y="179" xml:space="preserve">     AVAILABILITY       System is accessible when needed</text>
    <text x="24" y="239" xml:space="preserve">  + Non-repudiation: Cannot deny actions (audit trail)</text>
