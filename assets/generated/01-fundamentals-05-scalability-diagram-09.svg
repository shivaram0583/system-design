  <g>
    <text x="24" y="39" xml:space="preserve">Speedup = 1 / (S + (1-S)/N)</text>
    <text x="24" y="79" xml:space="preserve">Where:</text>
    <text x="24" y="99" xml:space="preserve">  S = fraction of work that is sequential (can&apos;t be parallelized)</text>
    <text x="24" y="119" xml:space="preserve">  N = number of processors/servers</text>
    <text x="24" y="159" xml:space="preserve">Example: If 10% of your system is sequential (S = 0.1):</text>
    <text x="24" y="179" xml:space="preserve">  N=2:   Speedup = 1/(0.1 + 0.9/2)  = 1.82×</text>
    <text x="24" y="199" xml:space="preserve">  N=4:   Speedup = 1/(0.1 + 0.9/4)  = 3.08×</text>
    <text x="24" y="219" xml:space="preserve">  N=10:  Speedup = 1/(0.1 + 0.9/10) = 5.26×</text>
    <text x="24" y="239" xml:space="preserve">  N=100: Speedup = 1/(0.1 + 0.9/100)= 9.17×</text>
    <text x="24" y="259" xml:space="preserve">  N=∞:   Speedup = 1/0.1            = 10×   ← MAX (can never exceed this!)</text>
    <text x="24" y="299" xml:space="preserve">Speedup ▲</text>
    <text x="24" y="319" xml:space="preserve">   10×                                     Theoretical max (10% sequential)</text>
    <text x="24" y="339" xml:space="preserve">                       ╱                  </text>
    <text x="24" y="359" xml:space="preserve">   8×                ╱</text>
    <text x="24" y="379" xml:space="preserve">                   ╱</text>
    <text x="24" y="399" xml:space="preserve">   6×            ╱</text>
    <text x="24" y="419" xml:space="preserve">               ╱</text>
    <text x="24" y="439" xml:space="preserve">   4×        ╱</text>
    <text x="24" y="459" xml:space="preserve">           ╱</text>
    <text x="24" y="479" xml:space="preserve">   2×    ╱</text>
    <text x="24" y="499" xml:space="preserve">                                           ► Number of servers (N)</text>
    <text x="24" y="519" xml:space="preserve">        1    4    8   16   32   64   128</text>
    <text x="24" y="559" xml:space="preserve">Lesson: Identify and eliminate sequential bottlenecks BEFORE</text>
    <text x="24" y="579" xml:space="preserve">        throwing more hardware at the problem.</text>
  </g>
