  <g>
    <text x="24" y="39" xml:space="preserve">Multiple nodes accept writes (contrast with single-leader):</text>
    <text x="24" y="99" xml:space="preserve">    Leader A  ◄   ►  Leader B  ◄   ►  Leader C  </text>
    <text x="24" y="119" xml:space="preserve">    (US)             (EU)             (Asia)    </text>
    <text x="24" y="179" xml:space="preserve">  Each leader accepts writes for its region.</text>
    <text x="24" y="199" xml:space="preserve">  Changes replicated asynchronously to other leaders.</text>
    <text x="24" y="239" xml:space="preserve">  Conflict resolution (same row updated on two leaders):</text>
    <text x="24" y="259" xml:space="preserve">  • Last-writer-wins (LWW): Latest timestamp wins (simple, data loss risk)</text>
    <text x="24" y="279" xml:space="preserve">  • Merge: Combine changes (complex, application-specific)</text>
    <text x="24" y="299" xml:space="preserve">  • Custom resolution: Application decides on conflict</text>
    <text x="24" y="339" xml:space="preserve">  Used by: CockroachDB, YugabyteDB, Cassandra, DynamoDB Global Tables</text>
  </g>
