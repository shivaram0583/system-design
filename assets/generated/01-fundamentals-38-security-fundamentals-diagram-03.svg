  <g>
    <text x="24" y="39" xml:space="preserve">AWS VPC example:</text>
    <text x="24" y="79" xml:space="preserve">        Public Subnet               </text>
    <text x="24" y="99" xml:space="preserve">     ALB (Load Balancer)             ← Internet-facing</text>
    <text x="24" y="119" xml:space="preserve">     NAT Gateway                    </text>
    <text x="24" y="179" xml:space="preserve">               Private Subnet       </text>
    <text x="24" y="199" xml:space="preserve">     App Servers (EC2 / ECS)         ← No direct internet access</text>
    <text x="24" y="219" xml:space="preserve">     Security Group: Allow ALB:443  </text>
    <text x="24" y="279" xml:space="preserve">               Private Subnet       </text>
    <text x="24" y="299" xml:space="preserve">     Database (RDS)                  ← Most restricted</text>
    <text x="24" y="319" xml:space="preserve">     SG: Allow App servers:5432     </text>
    <text x="24" y="339" xml:space="preserve">     No internet access at all      </text>
    <text x="24" y="399" xml:space="preserve">  Principle: Minimize attack surface</text>
    <text x="24" y="419" xml:space="preserve">  • Only ALB is internet-facing</text>
    <text x="24" y="439" xml:space="preserve">  • App servers can&apos;t be reached directly</text>
    <text x="24" y="459" xml:space="preserve">  • DB can only be reached from app servers</text>
  </g>
</svg>
