  <g>
    <text x="24" y="39" xml:space="preserve">REQUEST-DRIVEN (synchronous):</text>
    <text x="24" y="59" xml:space="preserve">  Order Service   call  ► Payment Service   call  ► Inventory Service</text>
    <text x="24" y="79" xml:space="preserve">  Tight coupling: each service must know about the next.</text>
    <text x="24" y="119" xml:space="preserve">EVENT-DRIVEN (asynchronous):</text>
    <text x="24" y="139" xml:space="preserve">  Order Service   publishes &quot;OrderCreated&quot;  ► Event Bus</text>
    <text x="24" y="159" xml:space="preserve">    Payment Service ←   subscribes to &quot;OrderCreated&quot;</text>
    <text x="24" y="179" xml:space="preserve">    Inventory Service ←   subscribes to &quot;OrderCreated&quot;</text>
    <text x="24" y="199" xml:space="preserve">    Notification Service ←   subscribes to &quot;OrderCreated&quot;</text>
    <text x="24" y="239" xml:space="preserve">  Loose coupling: Order Service doesn&apos;t know who listens.</text>
  </g>
</svg>
