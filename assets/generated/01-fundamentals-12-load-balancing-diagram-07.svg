  <g>
    <text x="24" y="39" xml:space="preserve">SSL at LB (recommended):</text>
    <text x="24" y="59" xml:space="preserve">  Client   HTTPS  ► LB   HTTP  ► Servers</text>
    <text x="24" y="99" xml:space="preserve">  Pros:</text>
    <text x="24" y="119" xml:space="preserve">  • Servers don&apos;t need SSL certificates</text>
    <text x="24" y="139" xml:space="preserve">  • LB handles CPU-intensive encryption/decryption</text>
    <text x="24" y="159" xml:space="preserve">  • Easier certificate management (one place)</text>
    <text x="24" y="199" xml:space="preserve">  Cons:</text>
    <text x="24" y="219" xml:space="preserve">  • Traffic between LB and servers is unencrypted (OK within VPC)</text>
    <text x="24" y="239" xml:space="preserve">  • If compliance requires end-to-end encryption: use SSL passthrough</text>
    <text x="24" y="279" xml:space="preserve">SSL passthrough (L4):</text>
    <text x="24" y="299" xml:space="preserve">  Client   HTTPS  ► LB   HTTPS  ► Servers</text>
    <text x="24" y="319" xml:space="preserve">  LB can&apos;t inspect traffic (just routes TCP)</text>
  </g>
