  <g>
    <text x="24" y="39" xml:space="preserve">Platform: 10M orders/month, 3 years of data = 360M rows</text>
    <text x="24" y="79" xml:space="preserve">  Current: All in PostgreSQL → 500 GB, queries slowing down</text>
    <text x="24" y="99" xml:space="preserve">  Goal: Primary DB stays under 50M rows (5 months)</text>
    <text x="24" y="159" xml:space="preserve">     ARCHIVAL PIPELINE (runs nightly)                    </text>
    <text x="24" y="199" xml:space="preserve">     1. IDENTIFY: SELECT * FROM orders                   </text>
    <text x="24" y="219" xml:space="preserve">        WHERE created_at &lt; now() - interval &apos;5 months&apos;   </text>
    <text x="24" y="239" xml:space="preserve">        AND status IN (&apos;completed&apos;, &apos;cancelled&apos;)         </text>
    <text x="24" y="279" xml:space="preserve">     2. EXPORT: Write to S3 as Parquet, partitioned      </text>
    <text x="24" y="299" xml:space="preserve">        s3://archive/orders/year=2024/month=01/*.parquet </text>
    <text x="24" y="339" xml:space="preserve">     3. VERIFY: Count rows in S3 = count in DB           </text>
    <text x="24" y="359" xml:space="preserve">        Checksum validation                               </text>
    <text x="24" y="399" xml:space="preserve">     4. DELETE: Remove archived rows from PostgreSQL      </text>
    <text x="24" y="419" xml:space="preserve">        DELETE FROM orders WHERE id IN (archived_ids)    </text>
    <text x="24" y="439" xml:space="preserve">        Or: DETACH + DROP partition (if partitioned)      </text>
    <text x="24" y="479" xml:space="preserve">     5. VACUUM: Reclaim space in PostgreSQL               </text>
    <text x="24" y="539" xml:space="preserve">  Results:</text>
    <text x="24" y="559" xml:space="preserve">    PostgreSQL: 50M rows (50 GB) → fast queries ✓</text>
    <text x="24" y="579" xml:space="preserve">    S3 Archive: 310M rows (30 GB Parquet, compressed) → cheap ✓</text>
    <text x="24" y="599" xml:space="preserve">    Queryable: AWS Athena for historical reports ✓</text>
    <text x="24" y="619" xml:space="preserve">    Savings: $300/month RDS storage → $1/month S3 ✓</text>
  </g>
</svg>
