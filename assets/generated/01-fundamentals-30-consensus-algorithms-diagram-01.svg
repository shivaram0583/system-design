  <g>
    <text x="24" y="39" xml:space="preserve">Raft splits consensus into 3 sub-problems:</text>
    <text x="24" y="79" xml:space="preserve">1. LEADER ELECTION (covered in Topic 29)</text>
    <text x="24" y="99" xml:space="preserve">   → One leader at a time per term</text>
    <text x="24" y="139" xml:space="preserve">2. LOG REPLICATION</text>
    <text x="24" y="159" xml:space="preserve">   Client → Leader: &quot;Set X=5&quot;</text>
    <text x="24" y="179" xml:space="preserve">   Leader appends to its log: [index:7, term:3, cmd:&quot;Set X=5&quot;]</text>
    <text x="24" y="199" xml:space="preserve">   Leader sends AppendEntries to followers</text>
    <text x="24" y="219" xml:space="preserve">   Follower appends to its log → ACK</text>
    <text x="24" y="239" xml:space="preserve">   When majority ACK → Leader commits → applies to state machine</text>
    <text x="24" y="259" xml:space="preserve">   Leader notifies followers to commit</text>
    <text x="24" y="319" xml:space="preserve">    Leader         Follow 1       Follow 2 </text>
    <text x="24" y="339" xml:space="preserve">    Log:           Log:           Log:     </text>
    <text x="24" y="359" xml:space="preserve">    [1][2][3     ► [1][2][3       [1][2]   </text>
    <text x="24" y="379" xml:space="preserve">           ]              ]                </text>
    <text x="24" y="419" xml:space="preserve">   Majority (2/3) have entry 3 → COMMITTED</text>
    <text x="24" y="459" xml:space="preserve">3. SAFETY</text>
    <text x="24" y="479" xml:space="preserve">   Only a node with ALL committed entries can become leader.</text>
    <text x="24" y="499" xml:space="preserve">   Prevents losing committed data during leader changes.</text>
    <text x="24" y="539" xml:space="preserve">   New leader candidate: &quot;My last log entry is index 7, term 3&quot;</text>
    <text x="24" y="559" xml:space="preserve">   Voter checks: &quot;My last entry is index 6, term 3&quot; → candidate is more up-to-date → VOTE YES</text>
    <text x="24" y="579" xml:space="preserve">   Voter checks: &quot;My last entry is index 8, term 3&quot; → I&apos;m more up-to-date → VOTE NO</text>
  </g>
