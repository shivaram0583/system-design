  <g>
    <text x="24" y="39" xml:space="preserve">E-commerce: Reserve last item</text>
    <text x="24" y="99" xml:space="preserve">    Order         ►  Redis      ►  Inventory  </text>
    <text x="24" y="119" xml:space="preserve">    Service          Lock          DB         </text>
    <text x="24" y="179" xml:space="preserve">  Flow:</text>
    <text x="24" y="199" xml:space="preserve">  1. Acquire lock: SET lock:product_456 {owner} NX EX 10</text>
    <text x="24" y="219" xml:space="preserve">  2. Read inventory: SELECT stock FROM products WHERE id = 456</text>
    <text x="24" y="239" xml:space="preserve">  3. If stock &gt; 0: UPDATE products SET stock = stock - 1 WHERE id = 456</text>
    <text x="24" y="259" xml:space="preserve">  4. Release lock: DEL lock:product_456 (with owner check)</text>
    <text x="24" y="299" xml:space="preserve">  Better approach (no lock needed):</text>
    <text x="24" y="319" xml:space="preserve">  UPDATE products SET stock = stock - 1 WHERE id = 456 AND stock &gt; 0;</text>
    <text x="24" y="339" xml:space="preserve">  If rows_affected = 0 → out of stock (atomic, no lock!)</text>
  </g>
