  <g>
    <text x="24" y="39" xml:space="preserve">Architecture:</text>
    <text x="24" y="79" xml:space="preserve">    Client      ►  CloudFront       ►  S3 (Origin)   </text>
    <text x="24" y="99" xml:space="preserve">    (Tokyo)        Edge (Tokyo)        (us-east-1)   </text>
    <text x="24" y="159" xml:space="preserve">Upload flow:</text>
    <text x="24" y="179" xml:space="preserve">  App Server → S3 (original) → Lambda (resize) → S3 (variants)</text>
    <text x="24" y="219" xml:space="preserve">  S3 stores: /images/123/original.jpg  (5 MB)</text>
    <text x="24" y="239" xml:space="preserve">             /images/123/thumb_200.jpg (20 KB)</text>
    <text x="24" y="259" xml:space="preserve">             /images/123/medium_800.jpg (100 KB)</text>
    <text x="24" y="299" xml:space="preserve">Request flow:</text>
    <text x="24" y="319" xml:space="preserve">  GET https://cdn.example.com/images/123/thumb_200.jpg</text>
    <text x="24" y="339" xml:space="preserve">  → CloudFront edge (Tokyo): Cache HIT → return 20 KB in 10ms</text>
    <text x="24" y="359" xml:space="preserve">  → Cache MISS → fetch from S3 → cache → return</text>
    <text x="24" y="399" xml:space="preserve">  Cache-Control: public, max-age=86400, immutable</text>
    <text x="24" y="419" xml:space="preserve">  (Images are immutable — new version = new URL)</text>
    <text x="24" y="459" xml:space="preserve">Performance:</text>
    <text x="24" y="479" xml:space="preserve">  Without CDN: 200ms (Tokyo → Virginia round trip)</text>
    <text x="24" y="499" xml:space="preserve">  With CDN: 10ms (Tokyo edge) + 99% cache hit rate</text>
    <text x="24" y="519" xml:space="preserve">  Origin load reduction: 99% fewer requests to S3</text>
  </g>
</svg>
