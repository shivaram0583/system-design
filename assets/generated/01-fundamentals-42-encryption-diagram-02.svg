  <g>
    <text x="24" y="39" xml:space="preserve">SYMMETRIC: Same key for encrypt and decrypt.</text>
    <text x="24" y="79" xml:space="preserve">  Alice      key=&quot;secret123&quot;     ► Encrypt → ciphertext</text>
    <text x="24" y="99" xml:space="preserve">  Bob        key=&quot;secret123&quot;     ► Decrypt → plaintext</text>
    <text x="24" y="139" xml:space="preserve">  Problem: How to share the key securely?</text>
    <text x="24" y="159" xml:space="preserve">  Fast. Used for: data at rest, bulk data encryption.</text>
    <text x="24" y="179" xml:space="preserve">  Algorithms: AES-256, ChaCha20</text>
    <text x="24" y="219" xml:space="preserve">ASYMMETRIC: Two keys — public key (encrypt) and private key (decrypt).</text>
    <text x="24" y="259" xml:space="preserve">  Alice&apos;s PUBLIC key:  Anyone can encrypt with it</text>
    <text x="24" y="279" xml:space="preserve">  Alice&apos;s PRIVATE key: Only Alice can decrypt</text>
    <text x="24" y="319" xml:space="preserve">  Bob        Alice&apos;s public key      ► Encrypt → ciphertext</text>
    <text x="24" y="339" xml:space="preserve">  Alice      Alice&apos;s private key     ► Decrypt → plaintext</text>
    <text x="24" y="379" xml:space="preserve">  Slow but solves key distribution. Used for: key exchange, digital signatures.</text>
    <text x="24" y="399" xml:space="preserve">  Algorithms: RSA, ECDSA, Ed25519</text>
  </g>
