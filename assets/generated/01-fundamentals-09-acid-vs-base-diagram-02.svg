  <g>
    <text x="24" y="59" xml:space="preserve">   Order       ►  Payment      ► Inventory     ►   Notif    </text>
    <text x="24" y="79" xml:space="preserve">  Service         Service         Service         Service   </text>
    <text x="24" y="139" xml:space="preserve">Happy path:</text>
    <text x="24" y="159" xml:space="preserve">  1. Order Service: Create order (PENDING)</text>
    <text x="24" y="179" xml:space="preserve">  2. Payment Service: Charge card → success</text>
    <text x="24" y="199" xml:space="preserve">  3. Inventory Service: Reserve stock → success</text>
    <text x="24" y="219" xml:space="preserve">  4. Notification Service: Send email → success</text>
    <text x="24" y="239" xml:space="preserve">  5. Order Service: Update order (CONFIRMED)</text>
    <text x="24" y="279" xml:space="preserve">Failure at step 3 (out of stock):</text>
    <text x="24" y="299" xml:space="preserve">  3. Inventory Service: Reserve stock → FAILED</text>
    <text x="24" y="319" xml:space="preserve">  Compensate 2: Payment Service: Refund card</text>
    <text x="24" y="339" xml:space="preserve">  Compensate 1: Order Service: Cancel order (CANCELLED)</text>
    <text x="24" y="379" xml:space="preserve">Each service uses ACID locally (own DB transaction)</text>
    <text x="24" y="399" xml:space="preserve">Cross-service coordination is BASE (eventual consistency via events)</text>
  </g>
</svg>
