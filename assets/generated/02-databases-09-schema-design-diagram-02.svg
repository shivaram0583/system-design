  <g>
    <text x="24" y="59" xml:space="preserve">   Step 1: IDENTIFY ENTITIES                                  </text>
    <text x="24" y="79" xml:space="preserve">   Users, Products, Orders, Reviews, Categories              </text>
    <text x="24" y="119" xml:space="preserve">   Step 2: DEFINE RELATIONSHIPS                              </text>
    <text x="24" y="139" xml:space="preserve">   User 1:N Orders, Order N:M Products, Product 1:N Reviews  </text>
    <text x="24" y="179" xml:space="preserve">   Step 3: LIST ACCESS PATTERNS                              </text>
    <text x="24" y="199" xml:space="preserve">   • Get user profile by ID                                  </text>
    <text x="24" y="219" xml:space="preserve">   • Get orders for user (sorted by date)                    </text>
    <text x="24" y="239" xml:space="preserve">   • Get products by category (with filters)                 </text>
    <text x="24" y="259" xml:space="preserve">   • Get reviews for product (sorted by date)                </text>
    <text x="24" y="279" xml:space="preserve">   • Search products by name                                 </text>
    <text x="24" y="299" xml:space="preserve">   • Get order with all items and product details            </text>
    <text x="24" y="339" xml:space="preserve">   Step 4: CHOOSE DATABASE                                   </text>
    <text x="24" y="359" xml:space="preserve">   SQL (PostgreSQL): Transactions, JOINs, structured data    </text>
    <text x="24" y="379" xml:space="preserve">   + JSONB for flexible attributes                           </text>
    <text x="24" y="419" xml:space="preserve">   Step 5: NORMALIZE (3NF baseline)                          </text>
    <text x="24" y="439" xml:space="preserve">   Separate tables for each entity                           </text>
    <text x="24" y="479" xml:space="preserve">   Step 6: DENORMALIZE FOR PERFORMANCE                       </text>
    <text x="24" y="499" xml:space="preserve">   • unit_price snapshot on order_items                      </text>
    <text x="24" y="519" xml:space="preserve">   • avg_rating on products (materialized)                   </text>
    <text x="24" y="539" xml:space="preserve">   • user_name on orders (for listing without JOIN)          </text>
    <text x="24" y="579" xml:space="preserve">   Step 7: ADD INDEXES                                       </text>
    <text x="24" y="599" xml:space="preserve">   Based on access patterns (WHERE, ORDER BY, JOIN columns)  </text>
    <text x="24" y="639" xml:space="preserve">   Step 8: PLAN MIGRATIONS                                   </text>
    <text x="24" y="659" xml:space="preserve">   Schema changes must be backward-compatible                </text>
  </g>
</svg>
