  <g>
    <text x="24" y="59" xml:space="preserve">  Client     POST /pay     ►  Payment API    </text>
    <text x="24" y="79" xml:space="preserve">            Key: abc123                      </text>
    <text x="24" y="99" xml:space="preserve">                              1. Check Redis   ► EXISTS abc123?</text>
    <text x="24" y="119" xml:space="preserve">                              2. Process         YES → return stored</text>
    <text x="24" y="139" xml:space="preserve">                              3. Store           NO  → process → store</text>
    <text x="24" y="199" xml:space="preserve">Request 1 (first attempt):</text>
    <text x="24" y="219" xml:space="preserve">  Key: abc123 not in Redis → charge card → store {key: abc123, result: success} → return 200</text>
    <text x="24" y="259" xml:space="preserve">Request 2 (retry, same key):</text>
    <text x="24" y="279" xml:space="preserve">  Key: abc123 found in Redis → return stored result → 200 (no double charge)</text>
    <text x="24" y="319" xml:space="preserve">Request 3 (different payment):</text>
    <text x="24" y="339" xml:space="preserve">  Key: def456 not in Redis → charge card → store → return 200</text>
