  <g>
    <text x="24" y="39" xml:space="preserve">Problem: Each DB connection costs ~10 MB RAM + setup time.</text>
    <text x="24" y="59" xml:space="preserve">  1000 app servers × 10 connections each = 10,000 connections → DB OOM</text>
    <text x="24" y="99" xml:space="preserve">Solution: Connection pooler between app and DB.</text>
    <text x="24" y="159" xml:space="preserve">    App (1000     ►  PgBouncer         ► PostgreSQL </text>
    <text x="24" y="179" xml:space="preserve">    conns)           (50 pooled           (50 real  </text>
    <text x="24" y="199" xml:space="preserve">                      connections)         conns)   </text>
    <text x="24" y="259" xml:space="preserve">  Modes:</text>
    <text x="24" y="279" xml:space="preserve">  • Session pooling: 1 client = 1 server conn for session duration</text>
    <text x="24" y="299" xml:space="preserve">  • Transaction pooling: conn returned after each transaction (most efficient)</text>
    <text x="24" y="319" xml:space="preserve">  • Statement pooling: conn returned after each statement</text>
    <text x="24" y="359" xml:space="preserve">  PgBouncer settings:</text>
    <text x="24" y="379" xml:space="preserve">    pool_size = 50          # max DB connections</text>
    <text x="24" y="399" xml:space="preserve">    max_client_conn = 10000 # max app connections</text>
    <text x="24" y="419" xml:space="preserve">    pool_mode = transaction</text>
  </g>
</svg>
