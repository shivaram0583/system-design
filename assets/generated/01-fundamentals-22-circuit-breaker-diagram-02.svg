    <text x="24" y="39" xml:space="preserve">          Failure threshold reached</text>
    <text x="24" y="79" xml:space="preserve">     CLOSED                      ►    OPEN    </text>
    <text x="24" y="99" xml:space="preserve">    (normal)                       (fail fast) </text>
    <text x="24" y="119" xml:space="preserve">              ◄                               </text>
    <text x="24" y="139" xml:space="preserve">       ▲                                 </text>
    <text x="24" y="159" xml:space="preserve">                  Success                 Timeout expires</text>
    <text x="24" y="219" xml:space="preserve">                   HALF-OPEN  ◄          </text>
    <text x="24" y="239" xml:space="preserve">                   (testing)  </text>
    <text x="24" y="259" xml:space="preserve">    Enough                    </text>
    <text x="24" y="279" xml:space="preserve">    successes      Failure → back to OPEN</text>
    <text x="24" y="319" xml:space="preserve">CLOSED:  All requests pass through normally. Failures are counted.</text>
    <text x="24" y="339" xml:space="preserve">         If failure count &gt; threshold → switch to OPEN.</text>
    <text x="24" y="379" xml:space="preserve">OPEN:    All requests fail immediately with an error (no call to dependency).</text>
    <text x="24" y="399" xml:space="preserve">         After a timeout period → switch to HALF-OPEN.</text>
    <text x="24" y="439" xml:space="preserve">HALF-OPEN: A limited number of test requests pass through.</text>
    <text x="24" y="459" xml:space="preserve">           If they succeed → switch to CLOSED (recovered).</text>
    <text x="24" y="479" xml:space="preserve">           If they fail → switch back to OPEN.</text>
  </g>
