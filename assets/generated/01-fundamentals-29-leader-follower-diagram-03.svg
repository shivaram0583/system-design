  <g>
    <text x="24" y="39" xml:space="preserve">PostgreSQL with Patroni (leader election via etcd):</text>
    <text x="24" y="79" xml:space="preserve">Normal operation:</text>
    <text x="24" y="119" xml:space="preserve">     pg-1           pg-2           pg-3     </text>
    <text x="24" y="139" xml:space="preserve">    PRIMARY     ►  REPLICA     ►  REPLICA   </text>
    <text x="24" y="159" xml:space="preserve">   (leader)       (follower)     (follower) </text>
    <text x="24" y="239" xml:space="preserve">     etcd      Stores leader info, manages lease</text>
    <text x="24" y="259" xml:space="preserve">    cluster  </text>
    <text x="24" y="319" xml:space="preserve">Failover:</text>
    <text x="24" y="339" xml:space="preserve">  1. pg-1 crashes → etcd lease expires (30s)</text>
    <text x="24" y="359" xml:space="preserve">  2. Patroni on pg-2 and pg-3 compete for leadership</text>
    <text x="24" y="379" xml:space="preserve">  3. pg-2 wins election (lowest replication lag)</text>
    <text x="24" y="399" xml:space="preserve">  4. pg-2 promoted to PRIMARY</text>
    <text x="24" y="419" xml:space="preserve">  5. pg-3 reconfigured to follow pg-2</text>
    <text x="24" y="439" xml:space="preserve">  6. Connection pool (PgBouncer) updated to point to pg-2</text>
    <text x="24" y="459" xml:space="preserve">  7. Total downtime: ~30-60 seconds</text>
    <text x="24" y="499" xml:space="preserve">  When pg-1 recovers:</text>
    <text x="24" y="519" xml:space="preserve">    → Detects it&apos;s no longer leader</text>
    <text x="24" y="539" xml:space="preserve">    → Rejoins as replica following pg-2</text>
  </g>
</svg>
