  <g>
    <text x="24" y="39" xml:space="preserve">Trie: Tree where each node is a character, paths form words.</text>
    <text x="24" y="79" xml:space="preserve">  Root</text>
    <text x="24" y="99" xml:space="preserve">      i</text>
    <text x="24" y="119" xml:space="preserve">          p</text>
    <text x="24" y="139" xml:space="preserve">              h</text>
    <text x="24" y="159" xml:space="preserve">                  o</text>
    <text x="24" y="179" xml:space="preserve">                      n</text>
    <text x="24" y="199" xml:space="preserve">                          e [*] (count: 50M) → &quot;iphone&quot;</text>
    <text x="24" y="219" xml:space="preserve">                              1</text>
    <text x="24" y="239" xml:space="preserve">                                  5 [*] (count: 20M) → &quot;iphone 15&quot;</text>
    <text x="24" y="259" xml:space="preserve">                                  6 [*] (count: 8M)  → &quot;iphone 16&quot;</text>
    <text x="24" y="279" xml:space="preserve">                  a</text>
    <text x="24" y="299" xml:space="preserve">                      d [*] (count: 30M) → &quot;ipad&quot;</text>
    <text x="24" y="339" xml:space="preserve">  Query &quot;iph&quot; → traverse to node &apos;h&apos; → return top-K descendants:</text>
    <text x="24" y="359" xml:space="preserve">    1. &quot;iphone&quot; (50M)</text>
    <text x="24" y="379" xml:space="preserve">    2. &quot;ipad&quot; (30M)  -- wait, this doesn&apos;t match &quot;iph&quot;</text>
    <text x="24" y="419" xml:space="preserve">  Corrected: &quot;iph&quot; matches &quot;iphone&quot;, &quot;iphone 15&quot;, &quot;iphone 16&quot;</text>
    <text x="24" y="459" xml:space="preserve">Optimization: Store top-K results at each node</text>
    <text x="24" y="479" xml:space="preserve">  Node &apos;h&apos; caches: [&quot;iphone&quot;, &quot;iphone 15&quot;, &quot;iphone 16&quot;, &quot;iphoto&quot;, ...]</text>
    <text x="24" y="499" xml:space="preserve">  No need to traverse subtree at query time → O(prefix_length) lookup</text>
