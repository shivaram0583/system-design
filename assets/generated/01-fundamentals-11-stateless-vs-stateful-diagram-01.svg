  <g>
    <text x="24" y="39" xml:space="preserve">Pattern: Externalize State</text>
    <text x="24" y="79" xml:space="preserve">BEFORE (stateful):</text>
    <text x="24" y="119" xml:space="preserve">     Server 1    ← User A&apos;s session lives here</text>
    <text x="24" y="139" xml:space="preserve">     session:      If server 1 dies, session is LOST</text>
    <text x="24" y="159" xml:space="preserve">     {user: A}  </text>
    <text x="24" y="219" xml:space="preserve">AFTER (stateless with external store):</text>
    <text x="24" y="259" xml:space="preserve">     Server 1        Server 2     ← Both servers are identical</text>
    <text x="24" y="279" xml:space="preserve">     (no state)      (no state)     Any can serve any user</text>
    <text x="24" y="359" xml:space="preserve">             Redis      ← Session data lives here</text>
    <text x="24" y="379" xml:space="preserve">           {A: {...}}     Shared, persistent, replicated</text>
    <text x="24" y="439" xml:space="preserve">  Request flow:</text>
    <text x="24" y="459" xml:space="preserve">  1. Client sends request with session_id cookie</text>
    <text x="24" y="479" xml:space="preserve">  2. ANY server receives request</text>
    <text x="24" y="499" xml:space="preserve">  3. Server looks up session_id in Redis</text>
    <text x="24" y="519" xml:space="preserve">  4. Server processes request</text>
    <text x="24" y="539" xml:space="preserve">  5. Server returns response</text>
  </g>
</svg>
