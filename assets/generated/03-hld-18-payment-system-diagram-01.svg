<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="561" height="288" viewBox="0 0 561 288" role="img" aria-labelledby="title desc">
  <title id="title">Payment State Machine diagram</title>
  <desc id="desc">Generated vector rendering of a documentation diagram.</desc>
  <defs>
    <style>
      .card { fill: #fbfcff; stroke: #cbd5e1; stroke-width: 1.2; }
      .segments { stroke: #0f172a; stroke-width: 1.8; stroke-linecap: round; }
      text {
        fill: #0f172a;
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 14px;
      }
    </style>
  </defs>
  <rect class="card" x="0.6" y="0.6" width="559.8" height="286.8" rx="16" />
  <g class="segments">
    <line x1="61.800000000000004" y1="44" x2="61.800000000000004" y2="64" />
    <line x1="145.8" y1="44" x2="145.8" y2="64" />
    <line x1="355.8" y1="44" x2="355.8" y2="64" />
    <line x1="61.800000000000004" y1="64" x2="66" y2="74" />
    <line x1="145.8" y1="64" x2="145.8" y2="84" />
    <line x1="145.8" y1="84" x2="150.00000000000003" y2="94" />
    <line x1="389.4" y1="84" x2="389.4" y2="104" />
  </g>
  <g>
    <text x="24" y="39" xml:space="preserve">CREATED → PROCESSING → SUCCEEDED → SETTLED</text>
    <text x="24" y="79" xml:space="preserve">     → FAILED                     REFUND_REQUESTED → REFUNDED</text>
    <text x="24" y="99" xml:space="preserve">               → FAILED                     </text>
    <text x="24" y="119" xml:space="preserve">                                      REFUND_FAILED</text>
    <text x="24" y="159" xml:space="preserve">Each transition:</text>
    <text x="24" y="179" xml:space="preserve">  1. Validate transition is allowed</text>
    <text x="24" y="199" xml:space="preserve">  2. Update DB in transaction (optimistic locking)</text>
    <text x="24" y="219" xml:space="preserve">  3. Call PSP if needed (Stripe charge, refund)</text>
    <text x="24" y="239" xml:space="preserve">  4. Emit event to Kafka (payment.succeeded, payment.failed)</text>
    <text x="24" y="259" xml:space="preserve">  5. Never delete records — append-only for audit trail</text>
  </g>
</svg>
