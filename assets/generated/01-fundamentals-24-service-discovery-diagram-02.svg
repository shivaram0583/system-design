  <g>
    <text x="24" y="59" xml:space="preserve">   Service Registration Flow:                          </text>
    <text x="24" y="99" xml:space="preserve">   1. Payment Service starts on 10.0.1.5:8080         </text>
    <text x="24" y="119" xml:space="preserve">   2. Registers with Consul:                           </text>
    <text x="24" y="139" xml:space="preserve">      PUT /v1/agent/service/register                   </text>
    <text x="24" y="159" xml:space="preserve">      { &quot;name&quot;: &quot;payment&quot;, &quot;address&quot;: &quot;10.0.1.5&quot;,    </text>
    <text x="24" y="179" xml:space="preserve">        &quot;port&quot;: 8080, &quot;check&quot;: { &quot;http&quot;: &quot;/health&quot; }} </text>
    <text x="24" y="199" xml:space="preserve">   3. Consul starts health checking every 10s          </text>
    <text x="24" y="239" xml:space="preserve">   Service Discovery Flow:                             </text>
    <text x="24" y="279" xml:space="preserve">   1. Order Service needs payment-service              </text>
    <text x="24" y="299" xml:space="preserve">   2. Queries Consul:                                  </text>
    <text x="24" y="319" xml:space="preserve">      GET /v1/health/service/payment?passing=true      </text>
    <text x="24" y="339" xml:space="preserve">   3. Gets: [{addr: &quot;10.0.1.5:8080&quot;}, {addr: &quot;10.0.1.6:8080&quot;}]  </text>
    <text x="24" y="359" xml:space="preserve">   4. Client-side LB picks one → calls it             </text>
    <text x="24" y="399" xml:space="preserve">   Failure Flow:                                       </text>
    <text x="24" y="439" xml:space="preserve">   1. 10.0.1.5 crashes → health check fails           </text>
    <text x="24" y="459" xml:space="preserve">   2. Consul marks instance critical after 2 failures  </text>
    <text x="24" y="479" xml:space="preserve">   3. Next query returns only [10.0.1.6:8080]         </text>
    <text x="24" y="499" xml:space="preserve">   4. Traffic automatically routes to healthy instance  </text>
  </g>
</svg>
