  <g>
    <text x="24" y="39" xml:space="preserve">WITHOUT read replicas:</text>
    <text x="24" y="59" xml:space="preserve">  All reads + writes → Primary DB (bottleneck at high read load)</text>
    <text x="24" y="99" xml:space="preserve">  1000 reads/s + 100 writes/s → 1 DB handles all 1100 queries/s</text>
    <text x="24" y="139" xml:space="preserve">WITH read replicas:</text>
    <text x="24" y="159" xml:space="preserve">  Writes → Primary DB (100 writes/s)</text>
    <text x="24" y="179" xml:space="preserve">  Reads  → 3 Read Replicas (333 reads/s each)</text>
    <text x="24" y="239" xml:space="preserve">     Primary  ◄    All writes</text>
    <text x="24" y="259" xml:space="preserve">     (write)  </text>
    <text x="24" y="299" xml:space="preserve">            async replication</text>
    <text x="24" y="339" xml:space="preserve">   R1    R2    R3   ◄    All reads (load balanced)</text>
    <text x="24" y="399" xml:space="preserve">  Read capacity: scales linearly by adding replicas</text>
    <text x="24" y="419" xml:space="preserve">  Write capacity: unchanged (single primary)</text>
  </g>
