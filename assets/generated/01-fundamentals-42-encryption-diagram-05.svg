  <g>
    <text x="24" y="39" xml:space="preserve">The encryption is only as strong as the key management.</text>
    <text x="24" y="79" xml:space="preserve">KEY MANAGEMENT SERVICE (KMS):</text>
    <text x="24" y="99" xml:space="preserve">  AWS KMS, Google Cloud KMS, Azure Key Vault, HashiCorp Vault</text>
    <text x="24" y="139" xml:space="preserve">ENVELOPE ENCRYPTION:</text>
    <text x="24" y="159" xml:space="preserve">  Don&apos;t encrypt data directly with the master key.</text>
    <text x="24" y="199" xml:space="preserve">  1. Generate a Data Encryption Key (DEK)</text>
    <text x="24" y="219" xml:space="preserve">  2. Encrypt data with DEK (fast, symmetric)</text>
    <text x="24" y="239" xml:space="preserve">  3. Encrypt DEK with Master Key (KEK) from KMS</text>
    <text x="24" y="259" xml:space="preserve">  4. Store encrypted DEK alongside encrypted data</text>
    <text x="24" y="279" xml:space="preserve">  5. Discard plaintext DEK from memory</text>
    <text x="24" y="319" xml:space="preserve">  To decrypt:</text>
    <text x="24" y="339" xml:space="preserve">  1. Send encrypted DEK to KMS</text>
    <text x="24" y="359" xml:space="preserve">  2. KMS decrypts DEK using Master Key</text>
    <text x="24" y="379" xml:space="preserve">  3. Use DEK to decrypt data</text>
    <text x="24" y="439" xml:space="preserve">     Stored together:                          </text>
    <text x="24" y="459" xml:space="preserve">     encrypted_data = AES(data, DEK)          </text>
    <text x="24" y="479" xml:space="preserve">     encrypted_dek  = KMS_Encrypt(DEK, KEK)   </text>
    <text x="24" y="519" xml:space="preserve">     Master Key (KEK) NEVER leaves KMS         </text>
    <text x="24" y="539" xml:space="preserve">     Rotate DEKs frequently, KEK rarely        </text>
    <text x="24" y="599" xml:space="preserve">  Why envelope encryption?</text>
    <text x="24" y="619" xml:space="preserve">  • Master key never exposed (stays in KMS hardware)</text>
    <text x="24" y="639" xml:space="preserve">  • Each record/file can have its own DEK</text>
    <text x="24" y="659" xml:space="preserve">  • Rotating DEKs doesn&apos;t require re-encrypting all data</text>
    <text x="24" y="679" xml:space="preserve">  • KMS only handles small keys, not bulk data</text>
  </g>
