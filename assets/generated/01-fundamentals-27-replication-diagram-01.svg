  <g>
    <text x="24" y="39" xml:space="preserve">Single node (no replication):</text>
    <text x="24" y="79" xml:space="preserve">    Database   ← If this dies, ALL data is unavailable</text>
    <text x="24" y="139" xml:space="preserve">Replicated (3 copies):</text>
    <text x="24" y="179" xml:space="preserve">    Primary       Replica 1     Replica 2 </text>
    <text x="24" y="199" xml:space="preserve">    (writes)   ►  (reads)    ►  (reads)   </text>
    <text x="24" y="239" xml:space="preserve">  If primary dies → promote replica → minimal downtime</text>
    <text x="24" y="259" xml:space="preserve">  Reads can be served from any replica → 3× read capacity</text>
