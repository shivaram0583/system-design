  <g>
    <text x="24" y="39" xml:space="preserve">TRADITIONAL:</text>
    <text x="24" y="59" xml:space="preserve">  Same model for reads and writes</text>
    <text x="24" y="99" xml:space="preserve">    Service      read/write  ► Database</text>
    <text x="24" y="159" xml:space="preserve">CQRS:</text>
    <text x="24" y="179" xml:space="preserve">  Separate models optimized for reads vs writes</text>
    <text x="24" y="219" xml:space="preserve">    Command      writes          ►  Write DB      </text>
    <text x="24" y="239" xml:space="preserve">    Service                          (normalized)  </text>
    <text x="24" y="279" xml:space="preserve">                                            events</text>
    <text x="24" y="319" xml:space="preserve">    Query        reads           ►  Read DB       </text>
    <text x="24" y="339" xml:space="preserve">    Service                         (denormalized) </text>
    <text x="24" y="399" xml:space="preserve">  Write DB: Optimized for writes (normalized, ACID)</text>
    <text x="24" y="419" xml:space="preserve">  Read DB: Optimized for reads (denormalized, cached, materialized views)</text>
    <text x="24" y="439" xml:space="preserve">  Sync: Events from write side update the read side (eventual consistency)</text>
  </g>
</svg>
