  <g>
    <text x="24" y="39" xml:space="preserve">NoSQL: Start with queries, design schema to serve them.</text>
    <text x="24" y="79" xml:space="preserve">  Access patterns for a chat app:</text>
    <text x="24" y="99" xml:space="preserve">  1. Get messages for chat X, sorted by time (most recent first)</text>
    <text x="24" y="119" xml:space="preserve">  2. Get all chats for user Y</text>
    <text x="24" y="139" xml:space="preserve">  3. Get unread count for user Y</text>
    <text x="24" y="179" xml:space="preserve">  DynamoDB design:</text>
    <text x="24" y="219" xml:space="preserve">  Table: Messages</text>
    <text x="24" y="239" xml:space="preserve">  PK: chat_id       SK: timestamp#message_id</text>
    <text x="24" y="279" xml:space="preserve">    chat_id     SK                     sender    content  </text>
    <text x="24" y="299" xml:space="preserve">    chat_123    2024-01-15T10:00#m1   alice     hello    </text>
    <text x="24" y="319" xml:space="preserve">    chat_123    2024-01-15T10:01#m2   bob       hi       </text>
    <text x="24" y="379" xml:space="preserve">  GSI (Global Secondary Index) for pattern 2:</text>
    <text x="24" y="399" xml:space="preserve">  GSI-PK: user_id    GSI-SK: last_message_time</text>
    <text x="24" y="419" xml:space="preserve">  → Get all chats for a user, sorted by most recent</text>
    <text x="24" y="459" xml:space="preserve">  Pattern 3: Store unread_count as an attribute on the chat item</text>
    <text x="24" y="479" xml:space="preserve">  Increment atomically on new message, reset on read</text>
  </g>
</svg>
