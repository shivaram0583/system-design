  <g>
    <text x="24" y="39" xml:space="preserve">CLIENT-SIDE DISCOVERY:</text>
    <text x="24" y="59" xml:space="preserve">  Client queries registry directly, picks an instance, connects.</text>
    <text x="24" y="99" xml:space="preserve">              1. Query              </text>
    <text x="24" y="119" xml:space="preserve">    Client             ►  Registry  </text>
    <text x="24" y="139" xml:space="preserve">            ◄             (Consul)  </text>
    <text x="24" y="159" xml:space="preserve">              2. IPs                </text>
    <text x="24" y="199" xml:space="preserve">              3. Direct call</text>
    <text x="24" y="219" xml:space="preserve">                                    ► Service Instance</text>
    <text x="24" y="279" xml:space="preserve">  Client does load balancing (e.g., round-robin across returned IPs).</text>
    <text x="24" y="299" xml:space="preserve">  Pros: No extra hop, client controls LB strategy.</text>
    <text x="24" y="319" xml:space="preserve">  Cons: Client must implement discovery logic; language-specific.</text>
    <text x="24" y="359" xml:space="preserve">SERVER-SIDE DISCOVERY:</text>
    <text x="24" y="379" xml:space="preserve">  Client calls a load balancer/proxy; the proxy resolves via registry.</text>
    <text x="24" y="439" xml:space="preserve">    Client      ►   LB       ►  Registry  </text>
    <text x="24" y="459" xml:space="preserve">                             ►            </text>
    <text x="24" y="519" xml:space="preserve">                             ► Service Instance</text>
    <text x="24" y="579" xml:space="preserve">  Pros: Client is simple (just call LB); language-agnostic.</text>
    <text x="24" y="599" xml:space="preserve">  Cons: Extra network hop; LB is a potential bottleneck.</text>
  </g>
</svg>
