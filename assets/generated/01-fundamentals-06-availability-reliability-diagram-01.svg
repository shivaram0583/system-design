  <g>
    <text x="24" y="39" xml:space="preserve">SERIES (both must work):</text>
    <text x="24" y="79" xml:space="preserve">     A       ►   B        A(total) = A(a) × A(b)</text>
    <text x="24" y="99" xml:space="preserve">    99.9%       99.9%     = 0.999 × 0.999 = 99.8%</text>
    <text x="24" y="139" xml:space="preserve">  Availability DECREASES with more components in series</text>
    <text x="24" y="179" xml:space="preserve">PARALLEL (either can work):</text>
    <text x="24" y="219" xml:space="preserve">     A    </text>
    <text x="24" y="239" xml:space="preserve">    99.9%     A(total) = 1 - (1-A(a)) × (1-A(b))</text>
    <text x="24" y="259" xml:space="preserve">              = 1 - 0.001 × 0.001 = 99.9999%</text>
    <text x="24" y="299" xml:space="preserve">     B    </text>
    <text x="24" y="319" xml:space="preserve">    99.9% </text>
    <text x="24" y="359" xml:space="preserve">  Availability INCREASES with redundancy</text>
