  <g>
    <text x="24" y="39" xml:space="preserve">STATELESS SERVICE (Easy to scale):</text>
    <text x="24" y="79" xml:space="preserve">    Server 1   ← Any request can go to any server</text>
    <text x="24" y="99" xml:space="preserve">    No state      because no server stores user-specific data</text>
    <text x="24" y="159" xml:space="preserve">    Server 2   ← Each server is interchangeable</text>
    <text x="24" y="179" xml:space="preserve">    No state  </text>
    <text x="24" y="239" xml:space="preserve">STATEFUL SERVICE (Hard to scale):</text>
    <text x="24" y="279" xml:space="preserve">    Server 1           ← User A&apos;s session is HERE</text>
    <text x="24" y="299" xml:space="preserve">    Session: User A       If Server 1 dies, session is lost</text>
    <text x="24" y="319" xml:space="preserve">    Cart: [item1]         Requests must be routed to THIS server</text>
    <text x="24" y="379" xml:space="preserve">    Server 2           ← User B&apos;s session is HERE</text>
    <text x="24" y="399" xml:space="preserve">    Session: User B       Can&apos;t just add servers freely</text>
    <text x="24" y="419" xml:space="preserve">    Cart: [item2,3]   </text>
    <text x="24" y="479" xml:space="preserve">Solution: Move state OUT of the app server</text>
    <text x="24" y="519" xml:space="preserve">    Server 1      Server 2    ← Stateless, interchangeable</text>
    <text x="24" y="539" xml:space="preserve">    No state      No state  </text>
    <text x="24" y="619" xml:space="preserve">             Redis       ← Sessions stored externally</text>
    <text x="24" y="639" xml:space="preserve">            (Shared)        Any server can access any session</text>
  </g>
</svg>
