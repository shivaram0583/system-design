  <g>
    <text x="24" y="59" xml:space="preserve">   Order        ►    Circuit         ►  Payment Gateway </text>
    <text x="24" y="79" xml:space="preserve">  Service            Breaker            (Stripe)        </text>
    <text x="24" y="119" xml:space="preserve">                   State: CLOSED </text>
    <text x="24" y="139" xml:space="preserve">                   Failures: 2/5 </text>
    <text x="24" y="199" xml:space="preserve">Scenario:</text>
    <text x="24" y="219" xml:space="preserve">  1. Stripe starts timing out (5 failures in 1 min)</text>
    <text x="24" y="239" xml:space="preserve">  2. Circuit OPENS → orders get instant error</text>
    <text x="24" y="259" xml:space="preserve">  3. Fallback: Queue payment for retry + show &quot;Payment processing&quot;</text>
    <text x="24" y="279" xml:space="preserve">  4. After 30s → HALF-OPEN → try one Stripe call</text>
    <text x="24" y="299" xml:space="preserve">  5a. Success → CLOSE circuit → normal operation</text>
    <text x="24" y="319" xml:space="preserve">  5b. Failure → OPEN again → wait another 30s</text>
    <text x="24" y="359" xml:space="preserve">User experience:</text>
    <text x="24" y="379" xml:space="preserve">  CLOSED: &quot;Payment successful!&quot; (normal)</text>
    <text x="24" y="399" xml:space="preserve">  OPEN: &quot;Payment is being processed. You&apos;ll get a confirmation email.&quot;</text>
    <text x="24" y="419" xml:space="preserve">        (order saved, payment retried from queue)</text>
  </g>
</svg>
