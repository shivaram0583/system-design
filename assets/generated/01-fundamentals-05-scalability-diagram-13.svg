    <text x="24" y="59" xml:space="preserve">   Client    ►    CDN      ►     LB        ►  Redis     PostgreSQL </text>
    <text x="24" y="79" xml:space="preserve">               (cache 301                     Cache                </text>
    <text x="24" y="99" xml:space="preserve">               redirects)                                Primary + </text>
    <text x="24" y="119" xml:space="preserve">                                App ×3                   2 Read    </text>
    <text x="24" y="139" xml:space="preserve">                                                         Replicas  </text>
    <text x="24" y="199" xml:space="preserve">  Changes:</text>
    <text x="24" y="219" xml:space="preserve">  - CDN caches redirect responses (huge win — 301s are highly cacheable)</text>
    <text x="24" y="239" xml:space="preserve">  - Redis cache for URL lookups (read:write ratio is ~100:1)</text>
    <text x="24" y="259" xml:space="preserve">  - 3 app servers behind load balancer</text>
    <text x="24" y="279" xml:space="preserve">  - PostgreSQL read replicas for analytics queries</text>
    <text x="24" y="319" xml:space="preserve">  Cache hit rate: 95% (popular URLs are cached)</text>
    <text x="24" y="339" xml:space="preserve">  Effective DB QPS: 10K × 0.05 = 500 QPS (manageable)</text>
    <text x="24" y="379" xml:space="preserve">  QPS: 10K req/sec</text>
    <text x="24" y="399" xml:space="preserve">  Storage: 10M URLs × 500 bytes = 5 GB</text>
    <text x="24" y="419" xml:space="preserve">  Cost: $500/month</text>
