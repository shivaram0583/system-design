  <g>
    <text x="24" y="39" xml:space="preserve">RPO (Recovery Point Objective):</text>
    <text x="24" y="59" xml:space="preserve">  Maximum acceptable data loss measured in time.</text>
    <text x="24" y="79" xml:space="preserve">  &quot;How much data can we afford to lose?&quot;</text>
    <text x="24" y="119" xml:space="preserve">  RPO = 1 hour → backups every hour → lose at most 1 hour of data</text>
    <text x="24" y="139" xml:space="preserve">  RPO = 0 → synchronous replication → no data loss (expensive)</text>
    <text x="24" y="179" xml:space="preserve">RTO (Recovery Time Objective):</text>
    <text x="24" y="199" xml:space="preserve">  Maximum acceptable downtime.</text>
    <text x="24" y="219" xml:space="preserve">  &quot;How long can we be down?&quot;</text>
    <text x="24" y="259" xml:space="preserve">  RTO = 4 hours → must restore and be operational within 4 hours</text>
    <text x="24" y="279" xml:space="preserve">  RTO = 0 → hot standby, automatic failover (expensive)</text>
    <text x="24" y="339" xml:space="preserve">     Cost vs. RPO/RTO                              </text>
    <text x="24" y="379" xml:space="preserve">     RPO=24h, RTO=8h   → nightly backup to S3     </text>
    <text x="24" y="399" xml:space="preserve">                          Cost: $                   </text>
    <text x="24" y="439" xml:space="preserve">     RPO=1h, RTO=1h    → hourly backups + replica  </text>
    <text x="24" y="459" xml:space="preserve">                          Cost: $$                  </text>
    <text x="24" y="499" xml:space="preserve">     RPO=1min, RTO=5min → WAL archiving + hot      </text>
    <text x="24" y="519" xml:space="preserve">                          standby + auto-failover   </text>
    <text x="24" y="539" xml:space="preserve">                          Cost: $$$                 </text>
    <text x="24" y="579" xml:space="preserve">     RPO=0, RTO=0      → synchronous multi-region  </text>
    <text x="24" y="599" xml:space="preserve">                          replication               </text>
    <text x="24" y="619" xml:space="preserve">                          Cost: $$$$                </text>
  </g>
</svg>
