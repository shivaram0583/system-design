  <g>
    <text x="24" y="39" xml:space="preserve">HTTP header propagation (W3C standard):</text>
    <text x="24" y="79" xml:space="preserve">  Request from Service A → Service B:</text>
    <text x="24" y="99" xml:space="preserve">    traceparent: 00-0af7651916cd43dd8448eb211c80319c-b7ad6b7169203331-01</text>
    <text x="24" y="139" xml:space="preserve">                      trace-id (128-bit)                 parent-span-id    flags</text>
    <text x="24" y="159" xml:space="preserve">                 version                                                  sampled</text>
    <text x="24" y="199" xml:space="preserve">  Service B extracts trace-id → creates child span → propagates to Service C</text>
    <text x="24" y="239" xml:space="preserve">  Propagation formats:</text>
    <text x="24" y="259" xml:space="preserve">  • W3C Trace Context (standard): traceparent header</text>
    <text x="24" y="279" xml:space="preserve">  • B3 (Zipkin): X-B3-TraceId, X-B3-SpanId headers</text>
    <text x="24" y="299" xml:space="preserve">  • Jaeger: uber-trace-id header</text>
    <text x="24" y="319" xml:space="preserve">  • AWS X-Ray: X-Amzn-Trace-Id header</text>
    <text x="24" y="359" xml:space="preserve">  OpenTelemetry SDK handles propagation automatically.</text>
  </g>
