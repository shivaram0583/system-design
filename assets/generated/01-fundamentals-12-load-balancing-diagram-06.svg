<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="712" height="328" viewBox="0 0 712 328" role="img" aria-labelledby="title desc">
  <title id="title">Connection Draining diagram</title>
  <desc id="desc">Generated vector rendering of a documentation diagram.</desc>
  <defs>
    <style>
      .card { fill: #fbfcff; stroke: #cbd5e1; stroke-width: 1.2; }
      .segments { stroke: #0f172a; stroke-width: 1.8; stroke-linecap: round; }
      text {
        fill: #0f172a;
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 14px;
      }
    </style>
  </defs>
  <rect class="card" x="0.6" y="0.6" width="710.8" height="326.8" rx="16" />
  <g class="segments">
    <line x1="57.6" y1="274" x2="66" y2="274" />
    <line x1="66" y1="274" x2="74.4" y2="274" />
    <line x1="74.4" y1="274" x2="82.80000000000001" y2="274" />
    <line x1="82.80000000000001" y1="274" x2="91.20000000000002" y2="274" />
    <line x1="250.8" y1="274" x2="259.2" y2="274" />
    <line x1="259.20000000000005" y1="274" x2="267.6" y2="274" />
    <line x1="267.6" y1="274" x2="276" y2="274" />
    <line x1="276" y1="274" x2="284.4" y2="274" />
    <line x1="502.8" y1="274" x2="511.2" y2="274" />
    <line x1="511.20000000000005" y1="274" x2="519.6" y2="274" />
    <line x1="519.6" y1="274" x2="528" y2="274" />
    <line x1="528" y1="274" x2="536.4" y2="274" />
  </g>
  <g>
    <text x="24" y="39" xml:space="preserve">When removing a server from the pool (deploy, scale-down):</text>
    <text x="24" y="79" xml:space="preserve">WITHOUT draining:</text>
    <text x="24" y="99" xml:space="preserve">  Server removed → in-flight requests DROPPED → errors</text>
    <text x="24" y="139" xml:space="preserve">WITH draining:</text>
    <text x="24" y="159" xml:space="preserve">  1. LB stops sending NEW requests to server</text>
    <text x="24" y="179" xml:space="preserve">  2. Existing in-flight requests continue (grace period: 30-300s)</text>
    <text x="24" y="199" xml:space="preserve">  3. Once all connections close (or timeout) → server removed</text>
    <text x="24" y="219" xml:space="preserve">  4. Safe to terminate/update server</text>
    <text x="24" y="259" xml:space="preserve">  Timeline:</text>
    <text x="24" y="279" xml:space="preserve">         [Draining starts]      [All connections closed]      [Server removed]</text>
    <text x="24" y="299" xml:space="preserve">         No new requests      In-flight requests finish       Safe to terminate</text>
  </g>
</svg>
