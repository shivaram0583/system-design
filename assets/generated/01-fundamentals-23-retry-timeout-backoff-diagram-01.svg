  <g>
    <text x="24" y="39" xml:space="preserve">WITHOUT timeout:</text>
    <text x="24" y="59" xml:space="preserve">  Service A      request     ► Service B (stuck forever)</text>
    <text x="24" y="79" xml:space="preserve">  Thread hangs indefinitely → thread pool exhaustion → A crashes</text>
    <text x="24" y="119" xml:space="preserve">WITH timeout:</text>
    <text x="24" y="139" xml:space="preserve">  Service A      request (timeout: 3s)     ► Service B</text>
    <text x="24" y="159" xml:space="preserve">  After 3s with no response → timeout error → A can respond/retry</text>
    <text x="24" y="199" xml:space="preserve">Types:</text>
    <text x="24" y="219" xml:space="preserve">  Connection timeout: Max time to establish TCP connection (1-5s)</text>
    <text x="24" y="239" xml:space="preserve">  Read/Response timeout: Max time to receive response (3-30s)</text>
    <text x="24" y="259" xml:space="preserve">  Overall timeout: Total time for the entire operation (5-60s)</text>
  </g>
