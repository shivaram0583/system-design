  <g>
    <text x="24" y="39" xml:space="preserve">Challenge: Multiple API servers need shared rate limit state.</text>
    <text x="24" y="99" xml:space="preserve">    API1      API2      API3    All check the SAME counter</text>
    <text x="24" y="179" xml:space="preserve">             Redis     Atomic increment: INCR user:123:minute:1700000</text>
    <text x="24" y="199" xml:space="preserve">                       TTL auto-expires old keys</text>
    <text x="24" y="239" xml:space="preserve">Redis Lua script for atomic token bucket:</text>
    <text x="24" y="259" xml:space="preserve">  local tokens = redis.call(&apos;get&apos;, KEYS[1])</text>
    <text x="24" y="279" xml:space="preserve">  if tokens == false then tokens = ARGV[1] end  -- bucket capacity</text>
    <text x="24" y="299" xml:space="preserve">  if tonumber(tokens) &gt; 0 then</text>
    <text x="24" y="319" xml:space="preserve">    redis.call(&apos;decr&apos;, KEYS[1])</text>
    <text x="24" y="339" xml:space="preserve">    return 1  -- allowed</text>
    <text x="24" y="359" xml:space="preserve">  else</text>
    <text x="24" y="379" xml:space="preserve">    return 0  -- denied</text>
    <text x="24" y="399" xml:space="preserve">  end</text>
  </g>
</svg>
