  <g>
    <text x="24" y="39" xml:space="preserve">Daily pipeline: Raw events → Aggregated metrics → Dashboard</text>
    <text x="24" y="79" xml:space="preserve">  Schedule: 2:00 AM UTC daily (processes previous day)</text>
    <text x="24" y="139" xml:space="preserve">    S3 Raw          ►  Spark Job       ►  Data Warehouse  </text>
    <text x="24" y="159" xml:space="preserve">    Events             (EMR)              (Redshift)      </text>
    <text x="24" y="179" xml:space="preserve">    (Parquet)                                             </text>
    <text x="24" y="199" xml:space="preserve">                       Extract:           Tables:         </text>
    <text x="24" y="219" xml:space="preserve">                        S3 parquet         daily_metrics  </text>
    <text x="24" y="239" xml:space="preserve">  10 TB / day          Transform:          user_cohorts   </text>
    <text x="24" y="259" xml:space="preserve">                        aggregate          revenue_summary </text>
    <text x="24" y="279" xml:space="preserve">                        join                              </text>
    <text x="24" y="299" xml:space="preserve">                        clean                   </text>
    <text x="24" y="319" xml:space="preserve">                       Load:                           </text>
    <text x="24" y="339" xml:space="preserve">                        Redshift           Looker      </text>
    <text x="24" y="359" xml:space="preserve">                                           Dashboard   </text>
    <text x="24" y="419" xml:space="preserve">  Processing time: ~45 minutes for 10 TB</text>
    <text x="24" y="439" xml:space="preserve">  Cost: ~$15/run (spot instances)</text>
    <text x="24" y="459" xml:space="preserve">  SLA: Results available by 3:00 AM UTC</text>
  </g>
