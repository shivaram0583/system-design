  <g>
    <text x="24" y="39" xml:space="preserve">N = total replicas = 3</text>
    <text x="24" y="59" xml:space="preserve">W = write quorum (how many must confirm a write)</text>
    <text x="24" y="79" xml:space="preserve">R = read quorum (how many must respond to a read)</text>
    <text x="24" y="119" xml:space="preserve">STRONG CONSISTENCY: W + R &gt; N</text>
    <text x="24" y="139" xml:space="preserve">  Example: W=2, R=2, N=3</text>
    <text x="24" y="159" xml:space="preserve">  Write to 2 of 3 replicas → At least 1 replica in every read has latest data</text>
    <text x="24" y="199" xml:space="preserve">  Write:                   </text>
    <text x="24" y="219" xml:space="preserve">            A ✓    B ✓    C ✗   (2 of 3 confirmed = success)</text>
    <text x="24" y="279" xml:space="preserve">  Read:                    </text>
    <text x="24" y="299" xml:space="preserve">            A ✓    B      C ✓   (read from 2: at least one has latest)</text>
    <text x="24" y="359" xml:space="preserve">  Common configs:</text>
    <text x="24" y="379" xml:space="preserve">    W=N, R=1   → Strong writes, fast reads (read from any replica)</text>
    <text x="24" y="399" xml:space="preserve">    W=1, R=N   → Fast writes, strong reads (read from all)</text>
    <text x="24" y="419" xml:space="preserve">    W=⌈N/2⌉+1, R=⌈N/2⌉+1 → Balanced</text>
    <text x="24" y="439" xml:space="preserve">    W=1, R=1   → Eventual consistency (fastest, weakest)</text>
  </g>
</svg>
