  <g>
    <text x="24" y="39" xml:space="preserve">              1. POST /login {user, pass}               </text>
    <text x="24" y="59" xml:space="preserve">    Client                                  ►   Server   </text>
    <text x="24" y="99" xml:space="preserve">              2. { access_token: &quot;eyJ...&quot;,     Verify    </text>
    <text x="24" y="119" xml:space="preserve">                   refresh_token: &quot;xyz...&quot; }   creds     </text>
    <text x="24" y="139" xml:space="preserve">            ◄                                  Sign JWT  </text>
    <text x="24" y="179" xml:space="preserve">              3. GET /api/data</text>
    <text x="24" y="199" xml:space="preserve">              Authorization: Bearer eyJ...</text>
    <text x="24" y="219" xml:space="preserve">                                            ►            </text>
    <text x="24" y="239" xml:space="preserve">                                                Any       </text>
    <text x="24" y="259" xml:space="preserve">              4. 200 OK {data}                 Server    </text>
    <text x="24" y="279" xml:space="preserve">            ◄                                  Verify    </text>
    <text x="24" y="299" xml:space="preserve">                                                signature </text>
    <text x="24" y="359" xml:space="preserve">  JWT = Header.Payload.Signature (base64 encoded)</text>
    <text x="24" y="399" xml:space="preserve">  Header: {&quot;alg&quot;: &quot;RS256&quot;, &quot;typ&quot;: &quot;JWT&quot;}</text>
    <text x="24" y="419" xml:space="preserve">  Payload: {&quot;sub&quot;: &quot;usr_123&quot;, &quot;role&quot;: &quot;admin&quot;, &quot;exp&quot;: 1705363200}</text>
    <text x="24" y="439" xml:space="preserve">  Signature: RS256(header + payload, private_key)</text>
    <text x="24" y="479" xml:space="preserve">  Verification: Any server with the public key can verify the token.</text>
    <text x="24" y="499" xml:space="preserve">  No session store needed → stateless → scales horizontally.</text>
    <text x="24" y="539" xml:space="preserve">  Pros: Stateless, scalable, cross-service</text>
    <text x="24" y="559" xml:space="preserve">  Cons: Can&apos;t revoke until expiry (use short expiry + refresh tokens)</text>
  </g>
</svg>
