  <g>
    <text x="24" y="39" xml:space="preserve">TLS secures data in transit (HTTPS = HTTP + TLS).</text>
    <text x="24" y="79" xml:space="preserve">TLS 1.3 Handshake (simplified):</text>
    <text x="24" y="119" xml:space="preserve">  Client                          Server</text>
    <text x="24" y="159" xml:space="preserve">          ClientHello             ►   (supported ciphers, random)</text>
    <text x="24" y="199" xml:space="preserve">     ◄    ServerHello                (chosen cipher, certificate)</text>
    <text x="24" y="239" xml:space="preserve">       Verify server certificate     </text>
    <text x="24" y="259" xml:space="preserve">       (trusted CA? domain match?)   </text>
    <text x="24" y="299" xml:space="preserve">          Key Exchange           ►   (Diffie-Hellman)</text>
    <text x="24" y="339" xml:space="preserve">     ◄    Key Exchange            </text>
    <text x="24" y="379" xml:space="preserve">       Both derive shared secret     </text>
    <text x="24" y="399" xml:space="preserve">       (symmetric key for session)   </text>
    <text x="24" y="439" xml:space="preserve">     ◄   Encrypted data (AES)    ►   (all subsequent data encrypted)</text>
    <text x="24" y="479" xml:space="preserve">  TLS uses ASYMMETRIC crypto for key exchange (handshake)</text>
    <text x="24" y="499" xml:space="preserve">  then SYMMETRIC crypto for actual data (fast, bulk encryption).</text>
    <text x="24" y="539" xml:space="preserve">mTLS (Mutual TLS): Both client AND server present certificates.</text>
    <text x="24" y="559" xml:space="preserve">  Used for service-to-service auth in service mesh (Istio/Envoy).</text>
  </g>
