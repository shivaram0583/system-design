  <g>
    <text x="24" y="39" xml:space="preserve">EVENTUAL CONSISTENCY:</text>
    <text x="24" y="79" xml:space="preserve">  Time                                       ►</text>
    <text x="24" y="119" xml:space="preserve">  Client A:   WRITE(X=5)  ACK              ►</text>
    <text x="24" y="139" xml:space="preserve">                             (returns immediately)</text>
    <text x="24" y="159" xml:space="preserve">  Server 1:        X=5                     ►</text>
    <text x="24" y="179" xml:space="preserve">  Server 2:        X=3       X=5           ►  (replication lag)</text>
    <text x="24" y="199" xml:space="preserve">  Server 3:        X=3           X=5       ►  (more lag)</text>
    <text x="24" y="239" xml:space="preserve">  Client B:         READ ► X=3 ✗     (stale!)</text>
    <text x="24" y="259" xml:space="preserve">  Client C:                   READ ► X=5 ✓ (caught up)</text>
    <text x="24" y="299" xml:space="preserve">  Write returns immediately (only primary confirms).</text>
    <text x="24" y="319" xml:space="preserve">  Reads may be stale for a short window.</text>
    <text x="24" y="359" xml:space="preserve">  Benefit: Lower latency, higher availability</text>
    <text x="24" y="379" xml:space="preserve">  Cost: Clients may see stale data temporarily</text>
