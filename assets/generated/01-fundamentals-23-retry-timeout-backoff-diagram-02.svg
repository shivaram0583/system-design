  <g>
    <text x="24" y="39" xml:space="preserve">Order of application (outside → inside):</text>
    <text x="24" y="79" xml:space="preserve">  1. TIMEOUT (outermost)     Don&apos;t wait forever</text>
    <text x="24" y="99" xml:space="preserve">  2. RETRY + BACKOFF         Try again on transient failure</text>
    <text x="24" y="119" xml:space="preserve">  3. CIRCUIT BREAKER         Stop trying if dependency is down</text>
    <text x="24" y="139" xml:space="preserve">  4. BULKHEAD                Limit concurrent calls</text>
    <text x="24" y="159" xml:space="preserve">  5. ACTUAL CALL (innermost)</text>
    <text x="24" y="199" xml:space="preserve">  call = timeout(10s,</text>
    <text x="24" y="219" xml:space="preserve">           retry(3, exponential_backoff_with_jitter,</text>
    <text x="24" y="239" xml:space="preserve">             circuit_breaker(threshold=5,</text>
    <text x="24" y="259" xml:space="preserve">               bulkhead(max_concurrent=20,</text>
    <text x="24" y="279" xml:space="preserve">                 actual_http_call()))))</text>
  </g>
