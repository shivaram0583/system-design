  <g>
    <text x="24" y="39" xml:space="preserve">  Key                     Value</text>
    <text x="24" y="79" xml:space="preserve">  &quot;user:123&quot;              {&quot;name&quot;:&quot;Alice&quot;,&quot;email&quot;:&quot;a@b.com&quot;}</text>
    <text x="24" y="99" xml:space="preserve">  &quot;session:abc&quot;           {&quot;user_id&quot;:123,&quot;expires&quot;:1705363200}</text>
    <text x="24" y="119" xml:space="preserve">  &quot;cart:456&quot;              {&quot;items&quot;:[{&quot;sku&quot;:&quot;A1&quot;,&quot;qty&quot;:2}]}</text>
    <text x="24" y="139" xml:space="preserve">  &quot;rate_limit:10.0.0.1&quot;  {&quot;count&quot;:42,&quot;window_start&quot;:1705359600}</text>
    <text x="24" y="179" xml:space="preserve">  Operations:</text>
    <text x="24" y="199" xml:space="preserve">    GET  &quot;user:123&quot;         → returns the value</text>
    <text x="24" y="219" xml:space="preserve">    SET  &quot;user:123&quot; value   → stores/overwrites</text>
    <text x="24" y="239" xml:space="preserve">    DEL  &quot;user:123&quot;         → removes</text>
    <text x="24" y="259" xml:space="preserve">    TTL  &quot;session:abc&quot; 3600 → auto-expire in 1 hour</text>
    <text x="24" y="299" xml:space="preserve">  No schema, no joins, no complex queries.</text>
    <text x="24" y="319" xml:space="preserve">  Just GET and SET by key — blazing fast.</text>
  </g>
