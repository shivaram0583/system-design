  <g>
    <text x="24" y="39" xml:space="preserve">              Login                 Store session             </text>
    <text x="24" y="59" xml:space="preserve">    Client          ►  Auth Svc                  ►   Redis   </text>
    <text x="24" y="79" xml:space="preserve">                                                     Cluster  </text>
    <text x="24" y="99" xml:space="preserve">            ◄                    ◄                           </text>
    <text x="24" y="119" xml:space="preserve">             Cookie                session_id         TTL:    </text>
    <text x="24" y="139" xml:space="preserve">                                                      30 min  </text>
    <text x="24" y="179" xml:space="preserve">  Login:</text>
    <text x="24" y="199" xml:space="preserve">    1. Verify credentials</text>
    <text x="24" y="219" xml:space="preserve">    2. session_id = uuid4()</text>
    <text x="24" y="239" xml:space="preserve">    3. HSET &quot;session:{session_id}&quot; &quot;user_id&quot; &quot;123&quot; &quot;role&quot; &quot;admin&quot;</text>
    <text x="24" y="259" xml:space="preserve">    4. EXPIRE &quot;session:{session_id}&quot; 1800  (30 min)</text>
    <text x="24" y="279" xml:space="preserve">    5. Set-Cookie: session_id=...; HttpOnly; Secure</text>
    <text x="24" y="319" xml:space="preserve">  Each request:</text>
    <text x="24" y="339" xml:space="preserve">    1. Read session_id from cookie</text>
    <text x="24" y="359" xml:space="preserve">    2. HGETALL &quot;session:{session_id}&quot;</text>
    <text x="24" y="379" xml:space="preserve">    3. If exists → authenticated; EXPIRE to refresh TTL</text>
    <text x="24" y="399" xml:space="preserve">    4. If not → 401 Unauthorized</text>
    <text x="24" y="439" xml:space="preserve">  Logout:</text>
    <text x="24" y="459" xml:space="preserve">    DEL &quot;session:{session_id}&quot;</text>
    <text x="24" y="499" xml:space="preserve">  Scaling: Redis Cluster with 3 masters + 3 replicas</text>
    <text x="24" y="519" xml:space="preserve">  Capacity: 1M concurrent sessions × 1 KB = 1 GB RAM</text>
  </g>
</svg>
