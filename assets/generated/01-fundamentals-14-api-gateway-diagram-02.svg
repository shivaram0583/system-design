  <g>
    <text x="24" y="39" xml:space="preserve">Different clients need different API shapes:</text>
    <text x="24" y="79" xml:space="preserve">  Mobile App:  Needs compact responses, fewer fields, different auth</text>
    <text x="24" y="99" xml:space="preserve">  Web App:     Needs full responses, SSR support</text>
    <text x="24" y="119" xml:space="preserve">  3rd Party:   Needs rate-limited, versioned, documented API</text>
    <text x="24" y="159" xml:space="preserve">BFF Pattern — One gateway per client type:</text>
    <text x="24" y="199" xml:space="preserve">    Mobile      ►  Mobile BFF     </text>
    <text x="24" y="239" xml:space="preserve">                                     ►  Microservices </text>
    <text x="24" y="279" xml:space="preserve">     Web        ►   Web BFF       </text>
    <text x="24" y="339" xml:space="preserve">Each BFF:</text>
    <text x="24" y="359" xml:space="preserve">  • Tailors response format for its client</text>
    <text x="24" y="379" xml:space="preserve">  • Handles client-specific auth</text>
    <text x="24" y="399" xml:space="preserve">  • Aggregates exactly the fields needed</text>
    <text x="24" y="419" xml:space="preserve">  • Can be maintained by the frontend team</text>
  </g>
</svg>
