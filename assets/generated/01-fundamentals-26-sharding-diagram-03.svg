  <g>
    <text x="24" y="39" xml:space="preserve">Query: &quot;Find all orders over $100 across all users&quot;</text>
    <text x="24" y="79" xml:space="preserve">With shard key = user_id:</text>
    <text x="24" y="99" xml:space="preserve">  Order data is split by user across shards.</text>
    <text x="24" y="119" xml:space="preserve">  → Must query ALL shards → merge results → slow!</text>
    <text x="24" y="179" xml:space="preserve">    Shard 0       Shard 1       Shard 2   </text>
    <text x="24" y="199" xml:space="preserve">    Query...      Query...      Query...  </text>
    <text x="24" y="279" xml:space="preserve">                   Merge     ← Scatter-gather pattern</text>
    <text x="24" y="299" xml:space="preserve">                  Results  </text>
    <text x="24" y="359" xml:space="preserve">Strategies:</text>
    <text x="24" y="379" xml:space="preserve">  1. Denormalize: Store data redundantly so queries hit one shard</text>
    <text x="24" y="399" xml:space="preserve">  2. Secondary index service: Elasticsearch for cross-shard search</text>
    <text x="24" y="419" xml:space="preserve">  3. Materialized views: Pre-compute aggregations</text>
    <text x="24" y="439" xml:space="preserve">  4. Avoid: Design schema so most queries use the shard key</text>
  </g>
</svg>
