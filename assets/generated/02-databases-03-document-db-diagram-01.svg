  <g>
    <text x="24" y="59" xml:space="preserve">     mongos        Router: directs queries to correct shard</text>
    <text x="24" y="79" xml:space="preserve">     (router)    </text>
    <text x="24" y="199" xml:space="preserve">     Shard A          Shard B         Shard C    </text>
    <text x="24" y="219" xml:space="preserve">     user_id          user_id         user_id    </text>
    <text x="24" y="239" xml:space="preserve">     A-H              I-P             Q-Z        </text>
    <text x="24" y="259" xml:space="preserve">     (replica         (replica        (replica   </text>
    <text x="24" y="279" xml:space="preserve">      set)             set)            set)      </text>
    <text x="24" y="339" xml:space="preserve">  Shard key: Determines data distribution</text>
    <text x="24" y="379" xml:space="preserve">  Good shard keys:</text>
    <text x="24" y="399" xml:space="preserve">  ✓ High cardinality (many unique values)</text>
    <text x="24" y="419" xml:space="preserve">  ✓ Even distribution (no hot shards)</text>
    <text x="24" y="439" xml:space="preserve">  ✓ Matches query patterns (queries target 1 shard)</text>
    <text x="24" y="479" xml:space="preserve">  Bad shard keys:</text>
    <text x="24" y="499" xml:space="preserve">  ✗ Low cardinality (status: &quot;active&quot;/&quot;inactive&quot;)</text>
    <text x="24" y="519" xml:space="preserve">  ✗ Monotonically increasing (timestamps → all writes to last shard)</text>
    <text x="24" y="539" xml:space="preserve">  ✗ Not in query patterns (queries scatter to all shards)</text>
  </g>
</svg>
