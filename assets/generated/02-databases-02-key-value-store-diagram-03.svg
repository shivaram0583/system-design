  <g>
    <text x="24" y="39" xml:space="preserve">DynamoDB uses:</text>
    <text x="24" y="59" xml:space="preserve">  Partition Key (PK): Determines which partition stores the item</text>
    <text x="24" y="79" xml:space="preserve">  Sort Key (SK): Optional, enables range queries within a partition</text>
    <text x="24" y="119" xml:space="preserve">  Table: UserOrders</text>
    <text x="24" y="159" xml:space="preserve">    PK (user_id)      SK (order_id)      total    status  </text>
    <text x="24" y="199" xml:space="preserve">    user_123          order_2024_001     99.99    paid    </text>
    <text x="24" y="219" xml:space="preserve">    user_123          order_2024_002     49.50    pending </text>
    <text x="24" y="239" xml:space="preserve">    user_456          order_2024_003     75.00    paid    </text>
    <text x="24" y="299" xml:space="preserve">  Query by user: PK = &quot;user_123&quot; → all orders for user 123</text>
    <text x="24" y="319" xml:space="preserve">  Query specific: PK = &quot;user_123&quot; AND SK = &quot;order_2024_001&quot;</text>
    <text x="24" y="339" xml:space="preserve">  Range query: PK = &quot;user_123&quot; AND SK BETWEEN &quot;order_2024&quot; AND &quot;order_2025&quot;</text>
    <text x="24" y="379" xml:space="preserve">  Hot partition problem:</text>
    <text x="24" y="399" xml:space="preserve">    One user with 10M orders → one partition gets all traffic</text>
    <text x="24" y="419" xml:space="preserve">    Solution: Add random suffix to PK for write-heavy keys</text>
  </g>
</svg>
