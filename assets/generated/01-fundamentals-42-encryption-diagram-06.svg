  <g>
    <text x="24" y="39" xml:space="preserve">Instead of encrypting the entire database, encrypt specific sensitive fields:</text>
    <text x="24" y="79" xml:space="preserve">  Table: users</text>
    <text x="24" y="119" xml:space="preserve">     id     name       ssn (encrypted)        email    </text>
    <text x="24" y="159" xml:space="preserve">     1      Alice      enc:aGVsbG8gd29y...    a@b.com  </text>
    <text x="24" y="179" xml:space="preserve">     2      Bob        enc:c29ybGQ1Nz...      b@c.com  </text>
    <text x="24" y="239" xml:space="preserve">  Only SSN is encrypted. Name and email are plaintext.</text>
    <text x="24" y="259" xml:space="preserve">  Application decrypts SSN only when explicitly needed.</text>
    <text x="24" y="299" xml:space="preserve">  Benefits:</text>
    <text x="24" y="319" xml:space="preserve">  • Limits blast radius (compromised DB doesn&apos;t expose SSN)</text>
    <text x="24" y="339" xml:space="preserve">  • Different keys for different fields (SSN key vs address key)</text>
    <text x="24" y="359" xml:space="preserve">  • Meets PCI-DSS, HIPAA requirements for specific fields</text>
    <text x="24" y="399" xml:space="preserve">  Limitation: Can&apos;t query encrypted fields (WHERE ssn = &apos;...&apos; won&apos;t work)</text>
    <text x="24" y="419" xml:space="preserve">  Solution: Store a blind index (hash of plaintext) for lookups</text>
  </g>
</svg>
