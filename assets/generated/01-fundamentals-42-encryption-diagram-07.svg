  <g>
    <text x="24" y="39" xml:space="preserve">            Card: 4111...                Tokenize                  </text>
    <text x="24" y="59" xml:space="preserve">  Client                  ►  Payment              ►  Card Vault    </text>
    <text x="24" y="79" xml:space="preserve">  (TLS)                      Service                 (HSM-backed)  </text>
    <text x="24" y="119" xml:space="preserve">                                                      Stores:       </text>
    <text x="24" y="139" xml:space="preserve">                                                      tok_abc →     </text>
    <text x="24" y="159" xml:space="preserve">                                                       enc(4111...) </text>
    <text x="24" y="219" xml:space="preserve">  Flow:</text>
    <text x="24" y="239" xml:space="preserve">  1. Client sends card number over HTTPS (TLS 1.3)</text>
    <text x="24" y="259" xml:space="preserve">  2. Payment service sends card to vault for tokenization</text>
    <text x="24" y="279" xml:space="preserve">  3. Vault encrypts card (AES-256-GCM) with envelope encryption</text>
    <text x="24" y="299" xml:space="preserve">  4. Vault returns token: &quot;tok_abc123&quot;</text>
    <text x="24" y="319" xml:space="preserve">  5. Payment service stores token (not real card number)</text>
    <text x="24" y="339" xml:space="preserve">  6. To charge: Payment service sends token → Vault decrypts → calls Stripe</text>
    <text x="24" y="379" xml:space="preserve">  Architecture:</text>
    <text x="24" y="399" xml:space="preserve">  • Card number NEVER stored in application database</text>
    <text x="24" y="419" xml:space="preserve">  • Vault is PCI-DSS compliant (isolated, audited, HSM)</text>
    <text x="24" y="439" xml:space="preserve">  • Application only handles tokens (not in PCI scope)</text>
    <text x="24" y="459" xml:space="preserve">  • HSM (Hardware Security Module): tamper-proof key storage</text>
  </g>
</svg>
