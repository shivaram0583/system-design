  <g>
    <text x="24" y="39" xml:space="preserve">Prometheus: Pull-based metrics collection</text>
    <text x="24" y="79" xml:space="preserve">                scrape every 15s              </text>
    <text x="24" y="99" xml:space="preserve">   Prometheus ◄                     App       </text>
    <text x="24" y="119" xml:space="preserve">                GET /metrics        (exporter) </text>
    <text x="24" y="179" xml:space="preserve">         remote_write</text>
    <text x="24" y="219" xml:space="preserve">     Thanos (long-term storage + HA)          </text>
    <text x="24" y="259" xml:space="preserve">     Thanos Sidecar → uploads blocks to S3    </text>
    <text x="24" y="279" xml:space="preserve">     Thanos Query   → queries across Prometheus + S3  </text>
    <text x="24" y="299" xml:space="preserve">     Thanos Compact → downsamples old data    </text>
    <text x="24" y="319" xml:space="preserve">     Thanos Store   → serves data from S3     </text>
    <text x="24" y="379" xml:space="preserve">  Prometheus: Local storage (15 days, fast queries)</text>
    <text x="24" y="399" xml:space="preserve">  Thanos/S3: Long-term storage (years, cheap)</text>
    <text x="24" y="439" xml:space="preserve">  Result: Fast recent queries + cheap long-term storage</text>
  </g>
</svg>
