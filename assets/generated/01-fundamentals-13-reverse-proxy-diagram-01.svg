  <g>
    <text x="24" y="39" xml:space="preserve">FORWARD PROXY (acts on behalf of CLIENTS):</text>
    <text x="24" y="79" xml:space="preserve">    Client    ►   Forward     ►   Server   </text>
    <text x="24" y="99" xml:space="preserve">                   Proxy                   </text>
    <text x="24" y="139" xml:space="preserve">  Client knows it&apos;s using a proxy.</text>
    <text x="24" y="159" xml:space="preserve">  Server sees proxy&apos;s IP, not client&apos;s.</text>
    <text x="24" y="179" xml:space="preserve">  Use: Corporate firewalls, content filtering, anonymity (VPN/Tor).</text>
    <text x="24" y="219" xml:space="preserve">REVERSE PROXY (acts on behalf of SERVERS):</text>
    <text x="24" y="259" xml:space="preserve">    Client    ►   Reverse     ►   Server   </text>
    <text x="24" y="279" xml:space="preserve">                   Proxy                   </text>
    <text x="24" y="319" xml:space="preserve">  Client doesn&apos;t know there&apos;s a proxy.</text>
    <text x="24" y="339" xml:space="preserve">  Client sees proxy&apos;s IP, not server&apos;s.</text>
    <text x="24" y="359" xml:space="preserve">  Use: Load balancing, SSL termination, caching, security.</text>
  </g>
</svg>
