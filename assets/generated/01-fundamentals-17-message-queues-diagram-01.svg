  <g>
    <text x="24" y="39" xml:space="preserve">SYNCHRONOUS (without queue):</text>
    <text x="24" y="59" xml:space="preserve">  Order Service      wait 5s     ► Email Service</text>
    <text x="24" y="79" xml:space="preserve">  User waits for email to be sent before getting order confirmation.</text>
    <text x="24" y="119" xml:space="preserve">ASYNCHRONOUS (with queue):</text>
    <text x="24" y="139" xml:space="preserve">  Order Service   ► [Queue]   ► Email Service</text>
    <text x="24" y="159" xml:space="preserve">  User gets instant confirmation. Email sent in background.</text>
    <text x="24" y="219" xml:space="preserve">    Producer     ►    Message       ►  Consumer  </text>
    <text x="24" y="239" xml:space="preserve">    (Order)           Queue            (Email)   </text>
    <text x="24" y="279" xml:space="preserve">                     M M M M    </text>
