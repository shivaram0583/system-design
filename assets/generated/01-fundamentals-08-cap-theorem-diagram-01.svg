  <g>
    <text x="24" y="39" xml:space="preserve">REALITY: P (Partition Tolerance) is NOT optional.</text>
    <text x="24" y="79" xml:space="preserve">Since P is required, the real choice is:</text>
    <text x="24" y="119" xml:space="preserve">  CP: When partition happens → BLOCK requests until partition heals</text>
    <text x="24" y="139" xml:space="preserve">      (maintain consistency, sacrifice availability)</text>
    <text x="24" y="179" xml:space="preserve">  AP: When partition happens → SERVE requests with possibly stale data</text>
    <text x="24" y="199" xml:space="preserve">      (maintain availability, sacrifice consistency)</text>
    <text x="24" y="259" xml:space="preserve">   NETWORK PARTITION OCCURS:                                     </text>
    <text x="24" y="299" xml:space="preserve">                      ✗ ✗ ✗                                     </text>
    <text x="24" y="319" xml:space="preserve">    Node A            ╳ ╳ ╳          Node B                     </text>
    <text x="24" y="339" xml:space="preserve">    Data: X=5    can&apos;t communicate   Data: X=3                    </text>
    <text x="24" y="399" xml:space="preserve">   Client asks Node B for X:                                     </text>
    <text x="24" y="439" xml:space="preserve">   CP choice: &quot;Sorry, I can&apos;t confirm X is up to date.          </text>
    <text x="24" y="459" xml:space="preserve">               Returning error 503.&quot; (Unavailable but consistent) </text>
    <text x="24" y="499" xml:space="preserve">   AP choice: &quot;X = 3. (It might be stale, but here&apos;s a          </text>
    <text x="24" y="519" xml:space="preserve">               response.)&quot; (Available but potentially stale)      </text>
  </g>
</svg>
