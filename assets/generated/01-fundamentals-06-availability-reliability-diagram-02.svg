  <g>
    <text x="24" y="39" xml:space="preserve">ACTIVE-PASSIVE (Failover):</text>
    <text x="24" y="79" xml:space="preserve">     Primary          Standby   </text>
    <text x="24" y="99" xml:space="preserve">    (Active)       ► (Passive)    Standby takes over on failure</text>
    <text x="24" y="119" xml:space="preserve">    Serves      sync  Idle,       Downtime = detection + failover time</text>
    <text x="24" y="139" xml:space="preserve">    traffic           ready       (typically 30s - 5min)</text>
    <text x="24" y="199" xml:space="preserve">ACTIVE-ACTIVE:</text>
    <text x="24" y="239" xml:space="preserve">    Server 1         Server 2  </text>
    <text x="24" y="259" xml:space="preserve">    (Active)   ◄  ►  (Active)     Both serve traffic</text>
    <text x="24" y="279" xml:space="preserve">    50% load   sync  50% load     If one fails, other handles 100%</text>
    <text x="24" y="299" xml:space="preserve">                                 No failover delay</text>
    <text x="24" y="359" xml:space="preserve">    Load Balancer    Routes to both; detects failures</text>
    <text x="24" y="419" xml:space="preserve">N+1 REDUNDANCY:</text>
    <text x="24" y="439" xml:space="preserve">  Need N servers to handle load. Deploy N+1.</text>
    <text x="24" y="479" xml:space="preserve">    S1     S2     S3     S4    ← Need 3 to handle load</text>
    <text x="24" y="499" xml:space="preserve">                                 S4 is the +1 spare</text>
    <text x="24" y="519" xml:space="preserve">  If any one fails, remaining 3 still handle full load.</text>
  </g>
</svg>
