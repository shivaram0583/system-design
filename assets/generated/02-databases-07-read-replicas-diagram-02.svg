  <g>
    <text x="24" y="39" xml:space="preserve">Product catalog: 10M products, 50K reads/s, 500 writes/s</text>
    <text x="24" y="99" xml:space="preserve">    App Server      ►   Primary       ← writes (500/s)</text>
    <text x="24" y="119" xml:space="preserve">    (write)             PostgreSQL       product updates, new products</text>
    <text x="24" y="159" xml:space="preserve">                              async replication</text>
    <text x="24" y="219" xml:space="preserve">                   Rep 1    Rep 2   Rep 3    </text>
    <text x="24" y="259" xml:space="preserve">                     ▲                        </text>
    <text x="24" y="299" xml:space="preserve">    App Server         ← reads (50K/s)      </text>
    <text x="24" y="319" xml:space="preserve">    (read)        load balanced across 3     </text>
    <text x="24" y="339" xml:space="preserve">                  replicas (~17K each)       </text>
    <text x="24" y="379" xml:space="preserve">  Consistency strategy:</text>
    <text x="24" y="399" xml:space="preserve">  • Product listings/search: eventual consistency (OK if 2-5s stale)</text>
    <text x="24" y="419" xml:space="preserve">  • After admin updates product: read from primary for 5s</text>
    <text x="24" y="439" xml:space="preserve">  • Inventory/stock checks: always read from primary (critical)</text>
    <text x="24" y="479" xml:space="preserve">  Cache layer (Redis) in front of replicas for hot products</text>
    <text x="24" y="499" xml:space="preserve">  Cache invalidation on product update event</text>
  </g>
</svg>
