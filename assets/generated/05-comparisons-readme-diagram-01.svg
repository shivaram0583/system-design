  <g>
    <text x="24" y="39" xml:space="preserve">Need ACID transactions + joins?   ► SQL (PostgreSQL, MySQL)</text>
    <text x="24" y="59" xml:space="preserve">Need flexible schema + scale?   ► Document DB (MongoDB)</text>
    <text x="24" y="79" xml:space="preserve">Need simple key-value at speed?   ► Key-Value (Redis, DynamoDB)</text>
    <text x="24" y="99" xml:space="preserve">Need analytics on huge data?   ► Columnar (Cassandra, ClickHouse)</text>
    <text x="24" y="119" xml:space="preserve">Need relationship traversal?   ► Graph DB (Neo4j)</text>
    <text x="24" y="139" xml:space="preserve">Need time-series metrics?   ► Time-Series (InfluxDB, TimescaleDB)</text>
  </g>
