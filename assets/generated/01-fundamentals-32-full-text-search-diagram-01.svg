    <text x="24" y="39" xml:space="preserve">Architecture:</text>
    <text x="24" y="79" xml:space="preserve">    Client      ►  Search        ►  Elasticsearch  </text>
    <text x="24" y="99" xml:space="preserve">                   API              (3 nodes)      </text>
    <text x="24" y="139" xml:space="preserve">                                         ▲</text>
    <text x="24" y="159" xml:space="preserve">                                    CDC (Debezium)</text>
    <text x="24" y="219" xml:space="preserve">                                    PostgreSQL   </text>
    <text x="24" y="239" xml:space="preserve">                                    (source of   </text>
    <text x="24" y="259" xml:space="preserve">                                     truth)      </text>
    <text x="24" y="319" xml:space="preserve">  Index mapping:</text>
    <text x="24" y="339" xml:space="preserve">    products: {</text>
    <text x="24" y="359" xml:space="preserve">      name: text (analyzed, boosted ×3)</text>
    <text x="24" y="379" xml:space="preserve">      description: text (analyzed)</text>
    <text x="24" y="399" xml:space="preserve">      brand: keyword (exact match + aggregation)</text>
    <text x="24" y="419" xml:space="preserve">      category: keyword (faceted search)</text>
    <text x="24" y="439" xml:space="preserve">      price: float (range filter)</text>
    <text x="24" y="459" xml:space="preserve">      rating: float (sort/filter)</text>
    <text x="24" y="479" xml:space="preserve">      in_stock: boolean (filter)</text>
    <text x="24" y="499" xml:space="preserve">    }</text>
    <text x="24" y="539" xml:space="preserve">  Query: &quot;nike running shoes&quot; with filters: price &lt; $100, in_stock = true</text>
    <text x="24" y="559" xml:space="preserve">    → Match &quot;nike running shoes&quot; in name (boosted) + description</text>
    <text x="24" y="579" xml:space="preserve">    → Filter: price &lt; 100 AND in_stock = true</text>
    <text x="24" y="599" xml:space="preserve">    → Sort by relevance score</text>
    <text x="24" y="619" xml:space="preserve">    → Return top 20 with facets (brands, categories, price ranges)</text>
  </g>
