  <g>
    <text x="24" y="39" xml:space="preserve">START HERE</text>
    <text x="24" y="79" xml:space="preserve">     Is the bottleneck CPU/RAM on a single machine?</text>
    <text x="24" y="99" xml:space="preserve">      YES → Try vertical first (simpler)</text>
    <text x="24" y="119" xml:space="preserve">      NO  ↓</text>
    <text x="24" y="159" xml:space="preserve">     Is the component stateless?</text>
    <text x="24" y="179" xml:space="preserve">      YES → Horizontal scaling (easy win)</text>
    <text x="24" y="199" xml:space="preserve">      NO  ↓</text>
    <text x="24" y="239" xml:space="preserve">     Is it a database?</text>
    <text x="24" y="259" xml:space="preserve">      YES → Vertical first, then read replicas, then sharding</text>
    <text x="24" y="279" xml:space="preserve">      NO  ↓</text>
    <text x="24" y="319" xml:space="preserve">     Do you need redundancy/HA?</text>
    <text x="24" y="339" xml:space="preserve">      YES → Must go horizontal (can&apos;t be HA with one machine)</text>
    <text x="24" y="359" xml:space="preserve">      NO  ↓</text>
    <text x="24" y="399" xml:space="preserve">     Is cost a concern at current scale?</text>
    <text x="24" y="419" xml:space="preserve">      YES → Horizontal (commodity hardware is cheaper)</text>
    <text x="24" y="439" xml:space="preserve">      NO  → Vertical (simpler to manage)</text>
  </g>
