  <g>
    <text x="24" y="39" xml:space="preserve">The standard AWS pattern for reliable fan-out:</text>
    <text x="24" y="99" xml:space="preserve">    Producer      ►  SNS       ►  SQS (A)       ►  Consumer A   </text>
    <text x="24" y="119" xml:space="preserve">                     Topic     ►  SQS (B)       ►  Consumer B   </text>
    <text x="24" y="139" xml:space="preserve">                               ►  SQS (C)       ►  Consumer C   </text>
    <text x="24" y="199" xml:space="preserve">  SNS: Fire-and-forget pub-sub (no retention)</text>
    <text x="24" y="219" xml:space="preserve">  SQS: Durable queue per subscriber (with DLQ, retry, visibility timeout)</text>
    <text x="24" y="259" xml:space="preserve">  Why not just SNS?</text>
    <text x="24" y="279" xml:space="preserve">    SNS is push-based. If subscriber is down, message is lost.</text>
    <text x="24" y="299" xml:space="preserve">    SQS buffers messages. Subscriber processes at its own pace.</text>
  </g>
</svg>
