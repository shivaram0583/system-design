  <g>
    <text x="24" y="39" xml:space="preserve">API Gateway authenticates → passes identity to downstream services:</text>
    <text x="24" y="99" xml:space="preserve">    Client    JWT  ►  API Gateway       ►  Service A </text>
    <text x="24" y="119" xml:space="preserve">                      • Validate   user_id            </text>
    <text x="24" y="139" xml:space="preserve">                        JWT        role     Trusts    </text>
    <text x="24" y="159" xml:space="preserve">                      • Extract    in       gateway   </text>
    <text x="24" y="179" xml:space="preserve">                        claims     header             </text>
    <text x="24" y="239" xml:space="preserve">  Gateway validates JWT once.</text>
    <text x="24" y="259" xml:space="preserve">  Passes user_id, roles as internal headers (X-User-Id, X-Roles).</text>
    <text x="24" y="279" xml:space="preserve">  Downstream services trust the gateway (internal network only).</text>
    <text x="24" y="319" xml:space="preserve">  Alternative: Each service validates JWT independently.</text>
    <text x="24" y="339" xml:space="preserve">  More secure (zero trust) but more compute overhead.</text>
  </g>
