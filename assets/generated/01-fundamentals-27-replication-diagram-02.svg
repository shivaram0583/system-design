    <text x="24" y="59" xml:space="preserve">    Primary     All writes go here</text>
    <text x="24" y="79" xml:space="preserve">    (Leader)  </text>
    <text x="24" y="119" xml:space="preserve">         replicate</text>
    <text x="24" y="199" xml:space="preserve"> Replica 1    Replica 2   Reads from any</text>
    <text x="24" y="259" xml:space="preserve">Pros: Simple, no write conflicts, strong consistency possible</text>
    <text x="24" y="279" xml:space="preserve">Cons: Single write bottleneck, leader is SPOF until failover</text>
    <text x="24" y="299" xml:space="preserve">Used by: PostgreSQL, MySQL, MongoDB (default), Redis</text>
