  <g>
    <text x="24" y="39" xml:space="preserve">QUEUE (Point-to-Point):</text>
    <text x="24" y="59" xml:space="preserve">  Each message consumed by exactly ONE consumer.</text>
    <text x="24" y="99" xml:space="preserve">    Producer     ► Queue     ► Consumer 1   ← Gets message A</text>
    <text x="24" y="119" xml:space="preserve">                    A,B,C    ► Consumer 2   ← Gets message B</text>
    <text x="24" y="139" xml:space="preserve">                             ► Consumer 3   ← Gets message C</text>
    <text x="24" y="159" xml:space="preserve">  Use: Task distribution, work queues</text>
    <text x="24" y="199" xml:space="preserve">TOPIC (Pub-Sub):</text>
    <text x="24" y="219" xml:space="preserve">  Each message delivered to ALL subscribers.</text>
    <text x="24" y="259" xml:space="preserve">    Producer     ► Topic     ► Subscriber 1   ← Gets ALL messages</text>
    <text x="24" y="279" xml:space="preserve">                    A,B,C    ► Subscriber 2   ← Gets ALL messages</text>
    <text x="24" y="299" xml:space="preserve">                             ► Subscriber 3   ← Gets ALL messages</text>
    <text x="24" y="319" xml:space="preserve">  Use: Event broadcasting, notifications</text>
  </g>
</svg>
