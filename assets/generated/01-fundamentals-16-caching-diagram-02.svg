  <g>
    <text x="24" y="39" xml:space="preserve">Single-node cache (in-process):</text>
    <text x="24" y="59" xml:space="preserve">  Pros: Fastest (no network), simplest</text>
    <text x="24" y="79" xml:space="preserve">  Cons: Limited by server RAM, lost on restart, not shared across instances</text>
    <text x="24" y="119" xml:space="preserve">Distributed cache (Redis/Memcached):</text>
    <text x="24" y="159" xml:space="preserve">    App1      App2      App3  </text>
    <text x="24" y="239" xml:space="preserve">             Redis     Shared across all app instances</text>
    <text x="24" y="259" xml:space="preserve">            Cluster    Persistent (optional), replicated</text>
    <text x="24" y="319" xml:space="preserve">  Redis Cluster (sharded):</text>
    <text x="24" y="339" xml:space="preserve">    Key → hash slot (0-16383) → node</text>
    <text x="24" y="359" xml:space="preserve">    Node 1: slots 0-5460</text>
    <text x="24" y="379" xml:space="preserve">    Node 2: slots 5461-10922</text>
    <text x="24" y="399" xml:space="preserve">    Node 3: slots 10923-16383</text>
