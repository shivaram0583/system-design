  <g>
    <text x="24" y="39" xml:space="preserve">              1. POST /login {user, pass}               </text>
    <text x="24" y="59" xml:space="preserve">    Client                                  ►   Server   </text>
    <text x="24" y="99" xml:space="preserve">              2. Set-Cookie: session_id=abc     Session   </text>
    <text x="24" y="119" xml:space="preserve">            ◄                                  Store:    </text>
    <text x="24" y="139" xml:space="preserve">                                                abc →     </text>
    <text x="24" y="159" xml:space="preserve">              3. GET /api/data                 {user:1}  </text>
    <text x="24" y="179" xml:space="preserve">              Cookie: session_id=abc                      </text>
    <text x="24" y="199" xml:space="preserve">                                            ►  Lookup    </text>
    <text x="24" y="219" xml:space="preserve">                                                abc →     </text>
    <text x="24" y="239" xml:space="preserve">              4. 200 OK {data}                 user 1    </text>
    <text x="24" y="259" xml:space="preserve">            ◄                                            </text>
    <text x="24" y="319" xml:space="preserve">  Session stored in:</text>
    <text x="24" y="339" xml:space="preserve">    Memory (single server only)</text>
    <text x="24" y="359" xml:space="preserve">    Redis (distributed, recommended)</text>
    <text x="24" y="379" xml:space="preserve">    Database (slowest, most durable)</text>
    <text x="24" y="419" xml:space="preserve">  Pros: Server can invalidate instantly, full control</text>
    <text x="24" y="439" xml:space="preserve">  Cons: Stateful, requires session store, sticky sessions or shared store</text>
  </g>
</svg>
